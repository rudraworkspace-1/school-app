/* ── Responsive layout ──
   The app's internal screens are built as a single vertical column (tile
   grids, button rows, forms). The column now fills the viewport fluidly at
   every size — phone, wide/landscape phone, tablet — so there's never a
   patch of empty unused space on the sides. Only on genuinely large desktop
   monitors does the column cap its width and center itself, since an
   uncapped column would otherwise stretch uncomfortably wide for reading. */
#root{width:100%;}
@media (min-width:1100px){
  body{display:flex;justify-content:center;background:linear-gradient(160deg,#E0E4F5 0%,#EEF1FA 100%);}
  #root{max-width:720px;box-shadow:0 0 0 1px rgba(15,23,42,.06),0 24px 70px rgba(15,23,42,.1);}
}

/* Press feedback */
.press{transition:transform .1s,opacity .1s;}
.press:active{transform:scale(.96);opacity:.9;}

/* Animations */

@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fadeUp{animation:fadeUp .28s ease both;}
.slideIn{animation:slideIn .22s ease both;}

.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}


/* Custom focus */
input:focus,textarea:focus,select:focus{outline:none;border-color:#4F46E5!important;box-shadow:0 0 0 3px rgba(79,70,229,.12);}

// SHA-256 hash using browser's native SubtleCrypto API (no external library needed)
const sha256=async(str)=>{
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};

// Lazily loads the (large) xlsx library only when a file is actually uploaded,
// instead of blocking every page load with a ~700KB script nobody may use.
let _xlsxLoading=null;
const loadXLSXLib=()=>{
  if(window.XLSX) return Promise.resolve();
  if(_xlsxLoading) return _xlsxLoading;
  _xlsxLoading=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.crossOrigin="anonymous";
    s.onload=res; s.onerror=()=>{_xlsxLoading=null;rej(new Error("Could not load spreadsheet library — check your internet connection."));};
    document.head.appendChild(s);
  });
  return _xlsxLoading;
};

const parseXLSX=f=>new Promise((res,rej)=>{
  loadXLSXLib().then(()=>{
    const r=new FileReader();
    r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"binary"});const ws=wb.Sheets[wb.SheetNames[0]];res(XLSX.utils.sheet_to_json(ws));}catch(err){rej(err);}};
    r.onerror=rej; r.readAsBinaryString(f);
  }).catch(rej);
});

  const l=(link||"").trim();
  if(!l) return "#";
  return /^https?:\/\//i.test(l)?l:`https://${l}`;

// ─── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [id,setId]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPw,setShowPw]=useState(false);

  const login=async()=>{
    if(!id.trim()||!pw.trim()) return setErr("Please enter your ID and password");
    setLoading(true); setErr("");
    try{
      // Calls our secure Edge Function — password verification happens on the SERVER,
      // not in the browser. The DB is never queried directly from the client for login.
      const res=await fetch(`${SUPABASE_URL}/functions/v1/secure-login`,{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY},
        body:JSON.stringify({id:id.trim(),password:pw.trim()})
      });
      const result=await res.json();
      if(!res.ok||result.error) return setErr(result.error||"Invalid ID or password");
      const u=safeUser(result.user);
      safeStorage.setItem("cps_user",JSON.stringify(u));
      onLogin(u);
    }catch{setErr("Connection error. Check your internet.");}
    finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#312E81 0%,#4338CA 45%,#6366F1 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      {/* Background patterns */}

// ─── HOMEWORK ──────────────────────────────────────────────────────────────────
function HomeworkScreen({user,onBack}){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("All");

  const load=()=>{
    setLoading(true);
    // Fetch homework for student's class, filtered by section or no section
    const q=user.section
      ?`?class=eq.${user.class}&or=(section.eq.${user.section},section.is.null)&order=due_date.asc`
      :`?class=eq.${user.class}&order=due_date.asc`;
    api("homework","GET",null,q).then(d=>setData(d||[])).finally(()=>setLoading(false));
  };
  useEffect(()=>{load();},[]);

  const subjects=["All",...Array.from(new Set(data.map(h=>h.subject).filter(Boolean)))];
  const filtered=filter==="All"?data:data.filter(h=>h.subject===filter);

  const RefreshBtn=<button onClick={load} style={{background:C.border,border:"none",borderRadius:8,padding:"5px 10px",color:C.t2,fontSize:11,fontWeight:600,cursor:"pointer"}}>↻ Refresh</button>;

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Header title="Homework" sub={`Class ${user.class||""} ${user.section||""}`} onBack={onBack} accent={C.blue} right={RefreshBtn}/>

      {subjects.length>1&&(
        <div style={{padding:"10px 14px 0",display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
          {subjects.map(s=>(
            <button key={s} onClick={()=>setFilter(s)}
              style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${filter===s?C.blue:C.border}`,background:filter===s?C.blueL:"#fff",color:filter===s?C.blue:C.t2,fontWeight:600,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
              {s}
            </button>
          ))}
        </div>
      )}

      <div style={{padding:"6px 0 24px"}}>
        {loading?<EmptyState msg="Loading…"/>:filtered.length===0?<EmptyState msg="No homework assigned"/>:
        filtered.map((h,i)=>{
          const due=h.due_date?new Date(h.due_date):null;
          const overdue=due&&due<new Date()&&h.status!=="done";
          return(
            <Card key={h.id} className={`fadeUp d${Math.min(i+1,5)}`} style={{marginTop:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>

            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ─── ATTENDANCE ────────────────────────────────────────────────────────────────
function AttendanceScreen({user,onBack}){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=()=>{
    setLoading(true);
    api("attendance","GET",null,`?student_id=eq.${user.id}&order=date.desc`)
      .then(d=>setData(d||[])).finally(()=>setLoading(false));
  };
  useEffect(()=>{load();},[]);

  const total=data.length, present=data.filter(a=>a.status==="Present").length;
  const absent=data.filter(a=>a.status==="Absent").length;
  const late=data.filter(a=>a.status==="Late").length;
  const pct=total?Math.round((present/total)*100):0;
  const good=pct>=75;

  // Group by month
  const grouped={};
  data.forEach(a=>{
    const d=new Date(a.date);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(a);
  });
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const RefreshBtn=<button onClick={load} style={{background:C.border,border:"none",borderRadius:8,padding:"5px 10px",color:C.t2,fontSize:11,fontWeight:600,cursor:"pointer"}}>↻ Refresh</button>;

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Header title="Attendance" sub={user.name||user.id} onBack={onBack} accent={C.teal} right={RefreshBtn}/>

      {data.length>0&&(
        <div style={{margin:"14px 14px 0"}}>
          {/* Summary card */}
          <div style={{background:"#fff",borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <p style={{fontSize:30,fontWeight:800,color:C.t1,fontFamily:"'Outfit',sans-serif",lineHeight:1}}>{pct}%</p>
                <p style={{fontSize:12,color:C.t3,marginTop:4}}>{present} of {total} days present</p>
              </div>
              <div style={{display:"flex",gap:6}}>
                <div style={{background:C.greenL,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                  <p style={{fontSize:16,fontWeight:800,color:C.green,fontFamily:"'Outfit',sans-serif"}}>{present}</p>
                  <p style={{fontSize:9,color:C.green,fontWeight:600}}>PRESENT</p>
                </div>
                <div style={{background:C.redL,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                  <p style={{fontSize:16,fontWeight:800,color:C.red,fontFamily:"'Outfit',sans-serif"}}>{absent}</p>
                  <p style={{fontSize:9,color:C.red,fontWeight:600}}>ABSENT</p>
                </div>
                {late>0&&<div style={{background:C.amberL,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                  <p style={{fontSize:16,fontWeight:800,color:C.amber,fontFamily:"'Outfit',sans-serif"}}>{late}</p>
                  <p style={{fontSize:9,color:C.amber,fontWeight:600}}>LATE</p>
                </div>}
              </div>
            </div>
            <div style={{height:6,background:C.border,borderRadius:4,overflow:"hidden"}}>
              <div style={{height:6,width:`${pct}%`,background:good?C.green:C.red,borderRadius:4,transition:"width .6s ease"}}/>
            </div>
            <p style={{fontSize:11,color:good?C.green:C.red,fontWeight:600,marginTop:8}}>
              {good?"Good attendance — keep it up!":"Below 75% — attendance needs improvement"}
            </p>
          </div>
        </div>
      )}

      {loading?<EmptyState msg="Loading…"/>:data.length===0?<EmptyState msg="No attendance records found"/>:
      Object.entries(grouped).map(([key,records])=>{
        const [yr,mo]=key.split("-");
        const label=`${months[parseInt(mo)-1]} ${yr}`;
        const mPresent=records.filter(r=>r.status==="Present").length;
        const mPct=Math.round((mPresent/records.length)*100);
        return(
          <div key={key}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 14px 6px"}}>
              <p style={{fontSize:10,fontWeight:700,color:C.t3,letterSpacing:1.2,textTransform:"uppercase"}}>{label}</p>
              <span style={{fontSize:11,fontWeight:600,color:mPct>=75?C.green:C.red}}>{mPct}% present</span>
            </div>
            <Card>
              {records.map((a,i)=>{
                const col=a.status==="Present"?C.green:a.status==="Late"?C.amber:C.red;
                const bg=a.status==="Present"?C.greenL:a.status==="Late"?C.amberL:C.redL;
                const d=new Date(a.date);
                const dayName=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
                return(
                  <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<records.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{width:32,height:32,borderRadius:8,background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                        <span style={{fontSize:13,fontWeight:800,color:col,lineHeight:1}}>{d.getDate()}</span>
                        <span style={{fontSize:8,color:col,fontWeight:600}}>{dayName}</span>
                      </div>
                      <span style={{fontSize:13,color:C.t2,fontWeight:500}}>{a.date}</span>
                    </div>
                    <Pill color={col} bg={bg}>{a.status}</Pill>
                  </div>
                );
              })}
            </Card>
          </div>
        );
      })}
      <div style={{paddingBottom:24}}/>
    </div>
  );
}

function FeesScreen({user,onBack}){

            <p style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:6}}>{paidPct}% paid</p>

          <div style={{display:"grid",gridTemplateColumns:partial>0?"1fr 1fr 1fr":"1fr 1fr",gap:8,marginBottom:4}}>

function AdminSettings({user,onUpdateUser}){
  const [data,setData]=useState({id:user.id||"",name:user.name||"",phone:user.phone||"",password:""});
  const [showPw,setShowPw]=useState(false);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");

  const f=(label,key,placeholder,type="text")=>(
    <div style={{marginBottom:12}}>
      <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>{label}</label>
      <input type={type} value={data[key]} onChange={e=>setData(d=>({...d,[key]:e.target.value}))} placeholder={placeholder}
        style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff"}}/>
    </div>
  );

  const save=async()=>{
    const newId=data.id.trim();
    if(!newId) return setErr("ID cannot be empty");
    setErr(""); setMsg(""); setSaving(true);
    try{
      // If changing ID, make sure nobody else already has it
      if(newId!==user.id){
        const existing=await api("users","GET",null,`?id=eq.${newId}&select=id`);
        if(existing&&existing.length>0){ setErr("That ID is already in use"); setSaving(false); return; }
      }
      const body={id:sanitize(newId),name:data.name.trim()||null,phone:data.phone.trim()||null};
      if(data.password.trim()){
        if(data.password.trim().length<6) return setErr("Password must be at least 6 characters");
        body.password=await sha256(data.password.trim());
      }
      await api("users","PATCH",body,`?id=eq.${user.id}`,"return=minimal");
      const updated={...user,...body};
      onUpdateUser(updated);
      setData(d=>({...d,password:""}));
      setMsg("Changes saved.");
    }catch{ setErr("Save failed. Check your connection and try again."); }
    finally{ setSaving(false); }
  };

  return(
    <div style={{padding:14,paddingBottom:32,maxWidth:480}}>
      <div style={{background:"#fff",borderRadius:16,padding:18,border:`1px solid ${C.border}`}}>
        <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:14}}>Edit Account Details</p>
        {f("Login ID","id","Your login ID")}
        {f("Full Name","name","Your name")}
        {f("Phone","phone","Contact number")}

        <div style={{marginBottom:4}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>New Password</label>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} value={data.password} onChange={e=>setData(d=>({...d,password:e.target.value}))}
              placeholder="Leave blank to keep current password"
              style={{width:"100%",padding:"11px 44px 11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff"}}/>
            <button onClick={()=>setShowPw(!showPw)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.t3}}>
              {showPw?Icon.eyeOff:Icon.eye}
            </button>
          </div>
        </div>

        <div style={{background:"#FEF3C7",borderRadius:10,padding:"8px 12px",margin:"14px 0",fontSize:12,color:"#B45309",fontWeight:600,display:"flex",alignItems:"flex-start",gap:6}}>
          {Icon.info}<span>Changing your Login ID or password takes effect immediately. You'll use the new credentials next time you sign in.</span>
        </div>

        {err&&<div style={{background:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.red,fontWeight:500}}>{err}</div>}
        {msg&&<div style={{background:C.greenL,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.green,fontWeight:600}}>{msg}</div>}

        <Btn onClick={save} disabled={saving}>{saving?"Saving...":"Save Changes"}</Btn>
      </div>
    </div>
  );
}

function AdminHomework(){
  const today=new Date().toISOString().split("T")[0];
  const [classes,setClasses]=useState([]); // [{class,sections:[]}]
  const [selClass,setSelClass]=useState("");
  const [selSection,setSelSection]=useState("All");
  const [subject,setSubject]=useState("");
  const [task,setTask]=useState("");
  const [dueDate,setDueDate]=useState(today);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [list,setList]=useState([]);
  const [listLoading,setListLoading]=useState(true);

  // Load distinct class+section combos from users table
  useEffect(()=>{
    api("users","GET",null,"?role=eq.student&select=class,section&order=class.asc,section.asc")
      .then(rows=>{
        const map={};
        (rows||[]).forEach(r=>{
          if(!r.class) return;
          if(!map[r.class]) map[r.class]=new Set();
          if(r.section) map[r.class].add(r.section);
        });
        const arr=Object.entries(map).map(([c,secs])=>({cls:c,sections:["All",...Array.from(secs).sort()]}));
        setClasses(arr);
        if(arr.length>0){setSelClass(arr[0].cls);setSelSection("All");}
      });
    loadList();
  },[]);

  const loadList=()=>{
    setListLoading(true);
    api("homework","GET",null,"?order=due_date.desc&limit=30")
      .then(d=>setList(d||[]))
      .finally(()=>setListLoading(false));
  };

  const sections=classes.find(c=>c.cls===selClass)?.sections||["All"];

  const submit=async()=>{
    if(!selClass) return setMsg("No classes found — upload students first");
    if(!subject.trim()) return setMsg("Enter a subject");
    if(!task.trim()) return setMsg("Enter the homework task");
    setLoading(true); setMsg("");
    try{
      const body={class:selClass,section:selSection==="All"?null:selSection,subject:subject.trim(),task:task.trim(),due_date:dueDate};
      await api("homework","POST",body,""," return=minimal");
      setMsg("Homework assigned!");
      setSubject(""); setTask(""); setDueDate(today);
      loadList();
    }catch{setMsg("Failed to assign homework");}
    finally{setLoading(false);}
  };

  const del=async(id)=>{
    await api("homework","DELETE",null,`?id=eq.${id}`);
    setList(list.filter(h=>h.id!==id));
  };

  // Group list by date
  const grouped=list.reduce((acc,h)=>{
    const k=h.due_date||"No date";
    if(!acc[k]) acc[k]=[];
    acc[k].push(h); return acc;
  },{});

  return(
    <div style={{padding:14,paddingBottom:32}}>

      {/* ── Assign form ── */}
      <div style={{background:"#fff",borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
        <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:30,height:30,borderRadius:8,background:C.blueL,display:"inline-flex",alignItems:"center",justifyContent:"center",color:C.blue,flexShrink:0}}>{Icon.book}</span>
          Assign Homework
        </p>

        {/* Class selector */}
        <p style={{fontSize:12,fontWeight:700,color:C.t2,marginBottom:8}}>Select Class</p>
        {classes.length===0
          ? <div style={{background:C.amberL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:C.amber,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info} No classes found. Upload students first.</div>
          : <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {classes.map(c=>(
                <button key={c.cls} onClick={()=>{setSelClass(c.cls);setSelSection("All");}}
                  style={{padding:"7px 16px",borderRadius:20,border:`1.5px solid ${selClass===c.cls?C.blue:C.border}`,background:selClass===c.cls?C.blueL:"#fff",color:selClass===c.cls?C.blue:C.t2,fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
                  Class {c.cls}
                </button>
              ))}
            </div>
        }

        {/* Section selector */}
        {selClass&&(
          <>
            <p style={{fontSize:12,fontWeight:700,color:C.t2,marginBottom:8}}>Select Section</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {sections.map(s=>(
                <button key={s} onClick={()=>setSelSection(s)}
                  style={{padding:"7px 16px",borderRadius:20,border:`1.5px solid ${selSection===s?C.P:C.border}`,background:selSection===s?C.PL:"#fff",color:selSection===s?C.P:C.t2,fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
                  {s==="All"?"All Sections":s}
                </button>
              ))}
            </div>
          </>
        )}

        {/* Subject */}
        <Input label="Subject" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g. Mathematics"/>

        {/* Task */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Homework Task</label>
          <textarea value={task} onChange={e=>setTask(e.target.value)} placeholder="Describe the homework…"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",height:90,resize:"none",lineHeight:1.6}}/>
        </div>

        {/* Due Date */}
        <Input type="date" label="Due Date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/>

        {msg&&(
          <div style={{background:msg.includes("!")?C.greenL:C.amberL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("!")?C.green:C.amber,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>
            {Icon.info}{msg}
          </div>
        )}

        <Btn onClick={submit} disabled={loading||!selClass}>
          {loading?"Assigning…":"Assign Homework"}
        </Btn>
      </div>

      {/* ── Recent homework list ── */}
      <SectionLabel>Recent Homework</SectionLabel>
      {listLoading?<EmptyState msg="Loading…"/>:list.length===0?<EmptyState msg="No homework assigned yet"/>:
      Object.entries(grouped).map(([date,items])=>(
        <div key={date} style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"0 2px"}}>
            <div style={{width:28,height:28,borderRadius:8,background:C.blueL,display:"flex",alignItems:"center",justifyContent:"center",color:C.blue,flexShrink:0}}>{Icon.cal}</div>
            <p style={{fontSize:12,fontWeight:700,color:C.blue}}>Due {date}</p>
          </div>
          {items.map(h=>(
            <div key={h.id} style={{background:"#fff",borderRadius:12,padding:"12px 12px",marginBottom:6,border:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
                  <Pill color={C.blue} bg={C.blueL}>{h.subject}</Pill>
                  <Pill color={C.P} bg={C.PL}>Class {h.class}{h.section?` · ${h.section}`:""}</Pill>
                </div>
                <p style={{fontSize:13,color:C.t2,lineHeight:1.55,marginTop:4}}>{h.task}</p>
              </div>
              <button onClick={()=>del(h.id)} style={{width:32,height:32,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {Icon.trash}
              </button>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function AdminOnlineClass(){
  const todayLocal=()=>new Date().toLocaleDateString("en-CA");
  const [classes,setClasses]=useState([]); // [{cls,sections:[]}]
  const [selDate,setSelDate]=useState(todayLocal());
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(true);

  const loadAll=()=>{
    setLoading(true);
    api("online_class","GET",null,"?order=created_at.desc&limit=300")
      .then(d=>setList(Array.isArray(d)?d:[]))
      .catch(()=>setList([]))
      .finally(()=>setLoading(false));
  };

  useEffect(()=>{
    api("users","GET",null,"?role=eq.student&select=class,section&order=class.asc,section.asc")
      .then(rows=>{
        if(!Array.isArray(rows)) return;
        const map={};
        rows.forEach(r=>{
          if(!r.class) return;
          if(!map[r.class]) map[r.class]=new Set();
          if(r.section) map[r.class].add(r.section);
        });
        const arr=Object.entries(map).map(([c,secs])=>({cls:c,sections:Array.from(secs).sort()}));
        arr.sort((a,b)=>a.cls.localeCompare(b.cls,undefined,{numeric:true}));
        setClasses(arr);
      })
      .catch(()=>{});
    loadAll();
  },[]);

  const del=async(id)=>{
    await api("online_class","DELETE",null,`?id=eq.${id}`);
    setList(list.filter(o=>o.id!==id));
  };

  const dateKey=ts=>{try{return new Date(ts).toLocaleDateString("en-CA");}catch{return"Unknown date";}};
  const timeStr=ts=>{try{return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}catch{return"";}};

  // Which classes got a link on the selected date
  const sentOnSelDate=list.filter(o=>dateKey(o.created_at)===selDate);
  const sentClassSet=new Set(sentOnSelDate.map(o=>o.class));

  // Full history grouped by date (list already arrives newest-first)
  const grouped=list.reduce((acc,o)=>{
    const k=dateKey(o.created_at);
    if(!acc[k]) acc[k]=[];
    acc[k].push(o); return acc;
  },{});

  return(
    <div style={{padding:14,paddingBottom:32}}>

      {/* ── Date-wise sent / not sent status ── */}
      <div style={{background:"#fff",borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
        <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:30,height:30,borderRadius:8,background:"#CFFAFE",display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#0891B2",flexShrink:0}}>{Icon.video}</span>
          Online Class Status
        </p>
        <Input type="date" label="Check status for date" value={selDate} onChange={e=>setSelDate(e.target.value)}/>

        {classes.length===0?
          <div style={{background:C.amberL,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.amber,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info} No classes found. Upload students first.</div>
        :
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {classes.map(c=>{
            const sent=sentClassSet.has(c.cls);
            const entries=sentOnSelDate.filter(o=>o.class===c.cls);
            return(
              <div key={c.cls} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"10px 12px",borderRadius:10,background:sent?C.greenL:C.redL,border:`1px solid ${sent?C.green:C.red}33`}}>
                <div style={{minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:700,color:C.t1}}>Class {c.cls}</p>
                  {sent&&<p style={{fontSize:11,color:C.t3,marginTop:2}}>{entries.map(e=>`${e.section||"All"} · ${timeStr(e.created_at)}`).join(", ")}</p>}
                </div>
                <Pill color={sent?C.green:C.red} bg="#fff">{sent?"Sent":"Not Sent"}</Pill>
              </div>
            );
          })}
        </div>
        }
      </div>

      {/* ── Full chronological log of every link ever shared ── */}
      <SectionLabel>All Shared Links (sorted by date)</SectionLabel>
      {loading?<EmptyState msg="Loading…"/>:list.length===0?<EmptyState msg="No online class links shared yet" icon={Icon.video}/>:
      Object.entries(grouped).map(([date,items])=>(
        <div key={date} style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"0 2px"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#CFFAFE",display:"flex",alignItems:"center",justifyContent:"center",color:"#0891B2",flexShrink:0}}>{Icon.cal}</div>
            <p style={{fontSize:12,fontWeight:700,color:"#0891B2"}}>{date}</p>
          </div>
          {items.map(o=>(
            <div key={o.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:6,border:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5,alignItems:"center"}}>
                  {o.subject&&<Pill color="#0891B2" bg="#CFFAFE">{o.subject}</Pill>}
                  <Pill color={C.P} bg={C.PL}>Class {o.class}{o.section?` · ${o.section}`:""}</Pill>
                  <span style={{fontSize:11,color:C.t3,fontWeight:600}}>{timeStr(o.created_at)}</span>
                </div>
                <a href={toHref(o.link)} target="_blank" rel="noopener noreferrer"
                  style={{fontSize:12,color:"#0891B2",lineHeight:1.5,wordBreak:"break-all",textDecoration:"underline",display:"inline-flex",alignItems:"center",gap:5}}>
                  {Icon.link}{o.link}
                </a>
              </div>
              <button onClick={()=>del(o.id)} style={{width:32,height:32,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {Icon.trash}
              </button>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function AdminUpload(){
  const [type,setType]=useState("students");
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);

  // Delete state
  const [delType,setDelType]=useState("students");
  const [confirmDel,setConfirmDel]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [delMsg,setDelMsg]=useState("");

  const chosen=UPLOAD_TYPES.find(t=>t.key===type);
  const chosenDel=UPLOAD_TYPES.find(t=>t.key===delType);

  // Each type maps to how we delete it
  // students/teachers → users table filtered by role
  // others → their own table, delete all rows
  const DELETE_MAP={
    students:{table:"users",query:"?role=eq.student"},
    teachers:{table:"users",query:"?role=eq.teacher"},
    attendance:{table:"attendance",query:"?student_id=neq.___none___"},
    fees:{table:"fees",query:"?student_id=neq.___none___"},
    homework:{table:"homework",query:"?class=neq.___none___"},
    calendar:{table:"calendar",query:"?event_name=neq.___none___"},
    comments:{table:"comments",query:"?student_id=neq.___none___"},
    transport:{table:"transport",query:"?student_id=neq.___none___"},
  };

  const handleFile=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setFile(f); setMsg(""); setPreview(null);
    try{const rows=await parseXLSX(f);setPreview(rows.slice(0,2));}catch(err){setMsg(err?.message||"Could not read file");}
  };

  const upload=async()=>{
    if(!file) return; setLoading(true); setMsg("");
    try{
      const rows=await parseXLSX(file);
      let processed=rows;
      const isUsers=(type==="students"||type==="teachers");
      if(isUsers){
        // Hash every password before uploading — never store plain text
        processed=await Promise.all(rows.map(async r=>{
          const base={...r};
          if(base.password) base.password=await sha256(String(base.password));
          if(type==="students") base.transport_opted=String(r.transport_opted||"").toLowerCase()==="yes";
          if(type==="students") base.role="student";
          return base;
        }));
      }
      const res=await fetch(`${SUPABASE_URL}/rest/v1/${chosen.table}${type==="students"?"?on_conflict=id":""}`,{
        method:"POST",
        headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:type==="students"?"resolution=merge-duplicates":"return=minimal"},
        body:JSON.stringify(processed)
      });
      if(!res.ok) throw new Error(await res.text());
      setMsg(`${rows.length} ${chosen.label} records uploaded successfully`);
      setFile(null); setPreview(null);
    }catch(e){setMsg("Upload failed: "+e.message);}
    finally{setLoading(false);}
  };

  const deleteAll=async()=>{
    setDeleting(true); setDelMsg("");
    const {table,query}=DELETE_MAP[delType];
    const h={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,Prefer:"return=minimal"};
    const del=async(t,q)=>{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}${q}`,{method:"DELETE",headers:h});
      if(!r.ok) throw new Error(await r.text());
    };
    try{
      if(delType==="students"){
        await del("attendance","?student_id=neq.___none___");
        await del("fees","?student_id=neq.___none___");
        await del("comments","?student_id=neq.___none___");
        await del("transport","?student_id=neq.___none___");
        await del("homework","?class=neq.___none___");
      }
      await del(table,query);
      setDelMsg(`All ${chosenDel.label} records deleted successfully.`);
    }catch(e){setDelMsg("Delete failed: "+e.message);}
    finally{setDeleting(false); setConfirmDel(false);}
  };

  return(
    <div style={{padding:14,paddingBottom:32}}>

      {/* ── Confirm Delete Modal ── */}
      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div className="fadeUp" style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:360,boxShadow:"0 24px 64px rgba(0,0,0,.3)"}}>
            <div style={{width:52,height:52,borderRadius:14,background:C.redL,display:"flex",alignItems:"center",justifyContent:"center",color:C.red,margin:"0 auto 14px"}}>
              {Icon.trash}
            </div>
            <p style={{fontWeight:800,fontSize:16,color:C.t1,textAlign:"center",fontFamily:"'Outfit',sans-serif"}}>Delete All {chosenDel.label}?</p>
            <p style={{fontSize:13,color:C.t2,textAlign:"center",marginTop:8,lineHeight:1.6,marginBottom:20}}>
              This will permanently delete <strong>all {chosenDel.label} records</strong> from the database. This cannot be undone.
            </p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn variant="ghost" onClick={()=>setConfirmDel(false)}>Cancel</Btn>
              <Btn variant="danger" onClick={deleteAll} disabled={deleting}>{deleting?"Deleting…":"Yes, Delete All"}</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ── Upload zone ── */}
      <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,width:"100%",padding:20,borderRadius:14,border:`2px dashed ${file?C.P:C.border}`,background:file?C.PL:"#fff",color:C.t2,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:12,textAlign:"center",transition:"all .15s"}}>
        <div style={{width:44,height:44,borderRadius:12,background:file?C.P:C.PL,display:"flex",alignItems:"center",justifyContent:"center",color:file?"#fff":C.P,transition:"all .15s"}}>
          {Icon.upload}
        </div>
        <span style={{color:file?C.P:C.t2}}>{file?file.name:"Tap to choose Excel file (.xlsx)"}</span>
        <span style={{fontSize:11,color:C.t3,fontWeight:400}}>Supported: .xlsx, .xls</span>
        <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleFile}/>
      </label>

      {preview&&(
        <div style={{background:"#fff",borderRadius:12,padding:12,marginBottom:10,border:`1px solid ${C.border}`}}>
          <p style={{fontWeight:700,fontSize:12,color:C.t2,marginBottom:6}}>Preview (first 2 rows)</p>
          {preview.map((row,i)=><p key={i} style={{fontSize:10,color:C.t3,lineHeight:1.5,wordBreak:"break-all",marginBottom:4,fontFamily:"monospace"}}>{JSON.stringify(row)}</p>)}
        </div>
      )}

      {/* ── Upload type selector ── */}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {UPLOAD_TYPES.map(t=>(
          <button key={t.key} onClick={()=>{setType(t.key);setFile(null);setPreview(null);setMsg("");}}
            style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${type===t.key?C.P:C.border}`,background:type===t.key?C.PL:"#fff",color:type===t.key?C.P:C.t2,fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{background:C.PL,borderRadius:12,padding:12,marginBottom:12,border:`1px solid ${C.P}33`,display:"flex",gap:8}}>

        <div>
          <p style={{fontSize:11,fontWeight:700,color:C.P,marginBottom:3}}>Required columns for {chosen.label}</p>
          <p style={{fontSize:11,color:C.t2,lineHeight:1.7}}>{chosen.note}</p>
        </div>
      </div>

      {msg&&<div style={{background:msg.includes("successfully")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("successfully")?C.green:C.red,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
        {Icon.info}{msg}
      </div>}

      {file&&<Btn onClick={upload} disabled={loading}>{Icon.upload}{loading?"Uploading…":"Upload "+chosen.label}</Btn>}

      {/* ── Delete Uploaded Data ── */}
      <div style={{marginTop:28,background:"#fff",borderRadius:16,padding:16,border:`1.5px solid ${C.red}33`}}>
        <p style={{fontWeight:800,fontSize:14,color:C.red,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:28,height:28,borderRadius:8,background:C.redL,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{Icon.trash}</span>
          Delete Uploaded Data
        </p>
        <p style={{fontSize:12,color:C.t3,marginBottom:14,lineHeight:1.6}}>Permanently deletes all records of the selected type from the database.</p>

        <SectionLabel>Select Data Type to Delete</SectionLabel>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {UPLOAD_TYPES.map(t=>(
            <button key={t.key} onClick={()=>{setDelType(t.key);setDelMsg("");}}
              style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${delType===t.key?C.red:C.border}`,background:delType===t.key?C.redL:"#fff",color:delType===t.key?C.red:C.t2,fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
              {t.label}
            </button>
          ))}
        </div>

        {delMsg&&<div style={{background:delMsg.includes("successfully")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:delMsg.includes("successfully")?C.green:C.red,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
          {Icon.info}{delMsg}
        </div>}

        <Btn variant="danger" onClick={()=>{setConfirmDel(true);setDelMsg("");}}>
          {Icon.trash} Delete All {chosenDel.label} Records
        </Btn>
      </div>

    </div>
  );
}

function AdminStudents(){
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selClass,setSelClass]=useState(null);
  const [selSection,setSelSection]=useState("All");
  const [confirm,setConfirm]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const [editing,setEditing]=useState(null);
  const [editData,setEditData]=useState({});
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSaveMsg]=useState("");

  useEffect(()=>{
    api("users","GET",null,"?role=eq.student&order=class.asc,section.asc,name.asc")
      .then(d=>setStudents(d||[])).finally(()=>setLoading(false));
  },[]);

  const removeStudent=async()=>{
    if(!confirm) return; setDeleting(true);
    try{
      await api("users","DELETE",null,`?id=eq.${confirm.id}`);
      setStudents(students.filter(s=>s.id!==confirm.id)); setConfirm(null);
    }catch{alert("Failed to remove student");}
    finally{setDeleting(false);}
  };

  const openEdit=st=>{setEditing(st);setEditData({name:st.name||"",password:"",class:st.class||"",section:st.section||"",father_name:st.father_name||"",mother_name:st.mother_name||"",phone:st.phone||"",transport_opted:st.transport_opted?"Yes":"No"});setSaveMsg("");};

  const saveEdit=async()=>{
    setSaving(true); setSaveMsg("");
    try{
      const body={name:editData.name.trim()||null,class:editData.class.trim()||null,section:editData.section.trim()||null,father_name:editData.father_name.trim()||null,mother_name:editData.mother_name.trim()||null,phone:editData.phone.trim()||null,transport_opted:editData.transport_opted==="Yes"};
      if(editData.password.trim()) body.password=await sha256(editData.password.trim());
      await api("users","PATCH",body,`?id=eq.${editing.id}`,"return=minimal");
      setStudents(students.map(s=>s.id===editing.id?{...s,...body}:s));
      setSaveMsg("Saved!");
      setTimeout(()=>setEditing(null),800);
    }catch{setSaveMsg("Save failed.");}
    finally{setSaving(false);}
  };

  const ef=(label,key,placeholder,type="text")=>(
    <div style={{marginBottom:10}}>
      <label style={{fontSize:11,fontWeight:600,color:C.t2,display:"block",marginBottom:4}}>{label}</label>
      <input type={type} value={editData[key]||""} onChange={e=>setEditData(d=>({...d,[key]:e.target.value}))} placeholder={placeholder}
        style={{width:"100%",padding:"9px 12px",borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13,color:C.t1,background:"#fff"}}/>
    </div>
  );

  const classMap={};
  students.forEach(s=>{const c=s.class||"—";if(!classMap[c])classMap[c]=0;classMap[c]++;});
  const classes=Object.keys(classMap).sort((a,b)=>isNaN(a)||isNaN(b)?a.localeCompare(b):Number(a)-Number(b));
  const inClass=selClass?students.filter(s=>s.class===selClass):[];
  const sections=["All",...Array.from(new Set(inClass.map(s=>s.section).filter(Boolean))).sort()];
  const visible=selSection==="All"?inClass:inClass.filter(s=>s.section===selSection);

  return(
    <div style={{padding:14}}>

      {/* Delete modal */}
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 24px"}}>
          <div className="fadeUp" style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:460,margin:"0 14px",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
            <div style={{width:48,height:48,borderRadius:14,background:C.redL,display:"flex",alignItems:"center",justifyContent:"center",color:C.red,margin:"0 auto 14px"}}>{Icon.trash}</div>
            <p style={{fontWeight:800,fontSize:16,color:C.t1,textAlign:"center",marginBottom:6}}>Remove Student?</p>
            <p style={{fontSize:13,color:C.t2,textAlign:"center",lineHeight:1.6,marginBottom:20}}>
              <strong>{confirm.name||confirm.id}</strong> (ID: {confirm.id}) will be permanently removed.
            </p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Btn>
              <Btn variant="danger" onClick={removeStudent} disabled={deleting}>{deleting?"Removing...":"Yes, Remove"}</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Edit modal */}
      {editing&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.6)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div className="fadeUp" style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:520,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{fontWeight:800,fontSize:15,color:C.t1}}>Edit Student</p>
              <button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,color:C.t2,fontWeight:600,cursor:"pointer"}}>Close</button>
            </div>
            <div style={{background:C.PL,borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:C.P,fontWeight:600}}>ID: {editing.id} — ID cannot be changed</div>
            {ef("Full Name","name","Student name")}
            {ef("Password","password","Login password")}
            {ef("Class","class","e.g. 5")}
            {ef("Section","section","e.g. A")}
            {ef("Father's Name","father_name","Father's name")}
            {ef("Mother's Name","mother_name","Mother's name")}
            {ef("Phone","phone","Contact number")}
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,fontWeight:600,color:C.t2,display:"block",marginBottom:4}}>Transport</label>
              <select value={editData.transport_opted} onChange={e=>setEditData(d=>({...d,transport_opted:e.target.value}))}
                style={{width:"100%",padding:"9px 12px",borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13,color:C.t1,background:"#fff"}}>
                <option value="No">Not opted</option>
                <option value="Yes">Opted</option>
              </select>
            </div>
            {saveMsg&&<div style={{background:saveMsg.includes("!")||saveMsg==="Saved!"?C.greenL:C.redL,borderRadius:9,padding:"8px 12px",marginBottom:10,fontSize:12,color:saveMsg.includes("!")||saveMsg==="Saved!"?C.green:C.red,fontWeight:600}}>{saveMsg}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn variant="ghost" onClick={()=>setEditing(null)}>Cancel</Btn>
              <Btn onClick={saveEdit} disabled={saving}>{saving?"Saving...":"Save Changes"}</Btn>
            </div>
          </div>
        </div>
      )}

      {!selClass?(
        loading?<EmptyState msg="Loading..."/>:classes.length===0?<EmptyState msg="No students found"/>:(
          <>
            <p style={{fontSize:12,color:C.t3,marginBottom:12,fontWeight:500}}>{students.length} students · {classes.length} classes</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {classes.map(c=>(
                <div key={c} onClick={()=>{setSelClass(c);setSelSection("All");}}
                  style={{background:"#fff",borderRadius:14,padding:"16px 14px",border:`1.5px solid ${C.border}`,cursor:"pointer"}}>
                  <p style={{fontSize:22,fontWeight:800,color:C.P,fontFamily:"'Outfit',sans-serif",lineHeight:1}}>Class {c}</p>
                  <p style={{fontSize:12,color:C.t3,fontWeight:500,marginTop:4}}>{classMap[c]} student{classMap[c]!==1?"s":""}</p>
                </div>
              ))}
            </div>
          </>
        )
      ):(
        <>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <button onClick={()=>setSelClass(null)} style={{width:34,height:34,borderRadius:10,border:`1.5px solid ${C.border}`,background:"#fff",color:C.t1,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
              {Icon.back}
            </button>
            <div>
              <p style={{fontWeight:800,fontSize:15,color:C.t1}}>Class {selClass}</p>
              <p style={{fontSize:11,color:C.t3}}>{inClass.length} students</p>
            </div>
          </div>
          {sections.length>1&&(
            <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:2}}>
              {sections.map(sec=>(
                <button key={sec} onClick={()=>setSelSection(sec)}
                  style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${selSection===sec?C.P:C.border}`,background:selSection===sec?C.PL:"#fff",color:selSection===sec?C.P:C.t2,fontWeight:600,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                  {sec==="All"?"All Sections":`Section ${sec}`}
                </button>
              ))}
            </div>
          )}
          <p style={{fontSize:12,color:C.t3,marginBottom:10,fontWeight:500}}>{visible.length} students</p>
          {visible.length===0?<EmptyState msg="No students in this section"/>:
          visible.map((st,i)=>(
            <div key={st.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <div onClick={()=>openEdit(st)} style={{display:"flex",gap:10,alignItems:"center",flex:1,minWidth:0,cursor:"pointer"}}>
                <div style={{width:38,height:38,borderRadius:10,background:C.PL,display:"flex",alignItems:"center",justifyContent:"center",color:C.P,fontSize:13,fontWeight:800,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
                  {i+1}
                </div>
                <div style={{minWidth:0}}>
                  <p style={{fontWeight:700,fontSize:13,color:C.P,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textDecoration:"underline dotted"}}>{st.name||"—"}</p>
                  <p style={{fontSize:11,color:C.t3}}>ID: {st.id}{st.section?` · Sec ${st.section}`:""}</p>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                {st.transport_opted&&<Pill color={C.amber} bg={C.amberL}>Bus</Pill>}
                <button onClick={()=>setConfirm(st)} style={{width:34,height:34,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {Icon.trash}
                </button>
              </div>
            </div>
          ))}
          <div style={{paddingBottom:16}}/>
        </>
      )}
    </div>
  );
}

function AdminPost(){
  const [title,setTitle]=useState("");
  const [desc,setDesc]=useState("");
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [list,setList]=useState([]);
  const load=()=>api("announcements","GET",null,"?order=date.desc&limit=15").then(d=>setList(d||[]));
  useEffect(()=>{load();},[]);
  const post=async()=>{
    if(!title.trim()) return setMsg("Enter a title");
    setLoading(true);
    try{await api("announcements","POST",{title:title.trim(),description:desc.trim()||null,date});setMsg("Posted successfully");setTitle("");setDesc("");load();}
    catch{setMsg("Failed to post");}
    finally{setLoading(false);}
  };
  const del=async(id)=>{await api("announcements","DELETE",null,`?id=eq.${id}`);setList(list.filter(a=>a.id!==id));};
  return(
    <div style={{padding:14}}>
      <Card style={{margin:"0 0 14px"}}>
        <p style={{fontWeight:700,fontSize:14,color:C.t1,marginBottom:12}}>New Announcement</p>
        <Input label="Title" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Enter title"/>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Description (optional)</label>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Add details…"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",height:80,resize:"none"}}/>
        </div>
        <Input type="date" label="Date" value={date} onChange={e=>setDate(e.target.value)}/>
        {msg&&<div style={{background:msg.includes("success")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("success")?C.green:C.red,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{msg}</div>}
        <Btn onClick={post} disabled={loading}>{loading?"Posting…":"Post Announcement"}</Btn>
      </Card>
      <SectionLabel>Recent Posts</SectionLabel>
      {list.map(a=>(
        <div key={a.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{flex:1}}>
            <p style={{fontWeight:700,fontSize:13,color:C.t1}}>{a.title}</p>
            <p style={{fontSize:11,color:C.t3,marginTop:2}}>{a.date}</p>
          </div>
          <button onClick={()=>del(a.id)} style={{width:34,height:34,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {Icon.trash}
          </button>
        </div>
      ))}
      <div style={{paddingBottom:16}}/>
    </div>
  );
}

function AdminManage(){
  const [section,setSection]=useState("homework");
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(false);
  const [confirm,setConfirm]=useState(null); // "6months" | "all"
  const [cleaning,setCleaning]=useState(false);
  const [cleanMsg,setCleanMsg]=useState("");

  const CLEANABLE={
    homework:{table:"homework",dateCol:"due_date",label:"Homework"},
    attendance:{table:"attendance",dateCol:"date",label:"Attendance"},
    calendar:{table:"calendar",dateCol:"event_date",label:"Calendar"},
    comments:{table:"comments",dateCol:"date",label:"Comments"},
  };

  const tables={homework:"homework",calendar:"calendar",comments:"comments",fees:"fees"};
  const load=async(sec)=>{
    setLoading(true);setList([]);setCleanMsg("");
    try{const d=await api(tables[sec],"GET",null,"?order=created_at.desc&limit=20");setList(d||[]);}
    finally{setLoading(false);}
  };
  useEffect(()=>{load(section);},[section]);

  const del=async(id)=>{await api(tables[section],"DELETE",null,`?id=eq.${id}`);setList(list.filter(i=>i.id!==id));};

  const runClean=async(mode)=>{
    setCleaning(true); setCleanMsg(""); setConfirm(null);
    const cutoff=new Date();
    if(mode==="6months") cutoff.setMonth(cutoff.getMonth()-6);
    else cutoff.setFullYear(cutoff.getFullYear()-10); // "all" = everything old
    const cutoffStr=cutoff.toISOString().split("T")[0];

    let total=0;
    try{
      for(const {table,dateCol} of Object.values(CLEANABLE)){
        const query=mode==="6months"
          ?`?${dateCol}=lt.${cutoffStr}`
          :`?${dateCol}=lt.${cutoffStr}`;
        const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{
          method:"DELETE",
          headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,Prefer:"return=representation"},
        });
        const deleted=await res.json().catch(()=>[]);
        total+=(deleted||[]).length;
      }
      setCleanMsg(total>0?`✓ Deleted ${total} old records successfully`:"No old records found to delete");
      load(section);
    }catch{setCleanMsg("Cleanup failed. Try again.");}
    finally{setCleaning(false);}
  };

  const renderItem=(item)=>{
    if(section==="homework") return `${item.class} · ${item.subject} · ${item.task}`;
    if(section==="calendar") return `${item.event_date} · ${item.event_name}`;
    if(section==="comments") return `${item.student_id} · ${item.from_name}: ${item.message}`;
    if(section==="fees") return `${item.student_id} · ${item.term} · ₹${item.amount} · ${item.status}`;
    return "";
  };

  // Cutoff date display
  const sixMonthsAgo=new Date();
  sixMonthsAgo.setMonth(sixMonthsAgo.getMonth()-6);
  const cutoffDisplay=sixMonthsAgo.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});

  return(
    <div style={{padding:14,paddingBottom:32}}>

      {/* Confirm modal */}
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:340,boxShadow:"0 24px 64px rgba(0,0,0,.25)"}}>
            <div style={{width:48,height:48,borderRadius:14,background:C.redL,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",color:C.red,fontSize:22}}>🗑️</div>
            <p style={{fontWeight:800,fontSize:16,color:C.t1,textAlign:"center",fontFamily:"'Outfit',sans-serif"}}>
              {confirm==="6months"?"Delete Records Older Than 6 Months":"Delete All Old Records"}
            </p>
            <p style={{fontSize:13,color:C.t3,textAlign:"center",marginTop:8,lineHeight:1.6}}>
              {confirm==="6months"
                ?`This will permanently delete homework, attendance, calendar, and comment records older than ${cutoffDisplay}. This cannot be undone.`
                :"This will delete all records from those tables. Student accounts and fee records will NOT be affected."}
            </p>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={()=>setConfirm(null)} style={{flex:1,padding:"11px",borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",color:C.t2,fontWeight:700,fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>runClean(confirm)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:C.red,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                {cleaning?"Deleting…":"Yes, Delete"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Auto-clean panel */}
      <div style={{background:"#fff",borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.amberL,display:"flex",alignItems:"center",justifyContent:"center",color:C.amber,fontSize:18,flexShrink:0}}>🧹</div>
          <div>
            <p style={{fontWeight:700,fontSize:14,color:C.t1}}>Database Cleanup</p>
            <p style={{fontSize:11,color:C.t3,marginTop:1}}>Removes old homework, attendance, calendar & comments</p>
          </div>
        </div>

        <div style={{background:C.amberL,borderRadius:10,padding:"10px 12px",marginBottom:12,border:`1px solid ${C.amber}22`}}>
          <p style={{fontSize:11,color:C.amber,fontWeight:600,lineHeight:1.6}}>
            ⚠️ Student accounts and fee records are <strong>never</strong> deleted by cleanup. Only time-based records (homework, attendance, calendar, comments) older than 6 months are removed.
          </p>
        </div>

        {cleanMsg&&(
          <div style={{background:cleanMsg.includes("✓")?C.greenL:C.redL,borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:12,color:cleanMsg.includes("✓")?C.green:C.red,fontWeight:600}}>
            {cleanMsg}
          </div>
        )}

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setConfirm("6months")} disabled={cleaning}
            style={{flex:2,padding:"11px 8px",borderRadius:12,border:`1.5px solid ${C.red}`,background:C.redL,color:C.red,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            🗑️ Delete older than 6 months
          </button>
        </div>
        <p style={{fontSize:10,color:C.t3,marginTop:8,textAlign:"center"}}>
          Will delete records before {cutoffDisplay}
        </p>
      </div>

      {/* Record viewer */}
      <SectionLabel>Recent Records</SectionLabel>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {Object.keys(tables).map(k=>(
          <button key={k} onClick={()=>setSection(k)}
            style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${section===k?C.P:C.border}`,background:section===k?C.PL:"#fff",color:section===k?C.P:C.t2,fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
            {k.charAt(0).toUpperCase()+k.slice(1)}
          </button>
        ))}
      </div>
      {loading?<EmptyState msg="Loading…"/>:list.length===0?<EmptyState msg="No records found"/>:
      list.map(item=>(
        <div key={item.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <p style={{fontSize:12,color:C.t2,flex:1,lineHeight:1.6}}>{renderItem(item)}</p>
          <button onClick={()=>del(item.id)} style={{width:34,height:34,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {Icon.trash}
          </button>
        </div>
      ))}
    </div>
  );
}

// ─── ADMIN FEES ────────────────────────────────────────────────────────────────
function AdminFees(){
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null); // student object
  const [fees,setFees]=useState([]);
  const [feesLoading,setFeesLoading]=useState(false);

  useEffect(()=>{
    api("users","GET",null,"?role=eq.student&order=name.asc")
      .then(d=>setStudents(d||[]))
      .finally(()=>setLoading(false));
  },[]);

  const openStudent=async(st)=>{
    setSelected(st); setFees([]); setFeesLoading(true);
    api("fees","GET",null,`?student_id=eq.${st.id}&order=due_date.asc`)
      .then(d=>setFees(d||[]))
      .finally(()=>setFeesLoading(false));
  };

  const delFee=async(id)=>{
    await api("fees","DELETE",null,`?id=eq.${id}`);
    setFees(fees.filter(f=>f.id!==id));
  };

  const updateStatus=async(id,status)=>{
    await fetch(`${SUPABASE_URL}/rest/v1/fees?id=eq.${id}`,{
      method:"PATCH",
      headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},
      body:JSON.stringify({status})
    });
    setFees(fees.map(f=>f.id===id?{...f,status}:f));
  };

  const filtered=students.filter(s=>
    (s.name||"").toLowerCase().includes(search.toLowerCase())||
    (s.id||"").toLowerCase().includes(search.toLowerCase())||
    (s.class||"").toLowerCase().includes(search.toLowerCase())
  );

  // ── Student fee detail view ──
  if(selected){
    const total=fees.reduce((a,b)=>a+(Number(b.amount)||0),0);
    const paid=fees.filter(f=>f.status==="Paid").reduce((a,b)=>a+(Number(b.amount)||0),0);
    const pending=total-paid;
    const pct=total?Math.round((paid/total)*100):0;
    return(
      <div style={{paddingBottom:32}}>
        {/* Student header */}
        <div style={{background:"linear-gradient(135deg,#1e3a5f,#1D4ED8)",margin:"14px 14px 0",borderRadius:16,padding:16}}>
          <button onClick={()=>setSelected(null)} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"5px 12px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:12}}>
            {Icon.back}<span>All Students</span>
          </button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:800,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
              {(selected.name||selected.id||"?")[0].toUpperCase()}
            </div>
            <div>
              <p style={{color:"#fff",fontWeight:800,fontSize:15,fontFamily:"'Outfit',sans-serif"}}>{selected.name||"—"}</p>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:11,marginTop:2}}>ID: {selected.id} · Class {selected.class||"—"} {selected.section||""}</p>
            </div>
          </div>
        </div>

        {/* Summary */}
        {fees.length>0&&(
          <div style={{margin:"10px 14px 0"}}>
            <div style={{background:"#fff",borderRadius:14,padding:14,border:`1px solid ${C.border}`,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <p style={{fontSize:11,color:C.t3,fontWeight:600}}>TOTAL FEES</p>
                  <p style={{fontSize:26,fontWeight:800,color:C.t1,fontFamily:"'Outfit',sans-serif"}}>₹{total.toLocaleString()}</p>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{fontSize:11,color:C.green,fontWeight:600}}>PAID</p>
                  <p style={{fontSize:20,fontWeight:800,color:C.green,fontFamily:"'Outfit',sans-serif"}}>₹{paid.toLocaleString()}</p>
                </div>
              </div>
              <div style={{height:6,background:C.border,borderRadius:4,overflow:"hidden",marginBottom:6}}>
                <div style={{height:6,width:`${pct}%`,background:C.green,borderRadius:4,transition:"width .5s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <p style={{fontSize:11,color:C.green,fontWeight:600}}>{pct}% paid</p>
                <p style={{fontSize:11,color:C.red,fontWeight:600}}>₹{pending.toLocaleString()} pending</p>
              </div>
            </div>
          </div>
        )}

        {/* Fee records */}
        <SectionLabel>Fee Records</SectionLabel>
        {feesLoading?<EmptyState msg="Loading…"/>:fees.length===0?<EmptyState msg="No fee records for this student"/>:
        fees.map((f,i)=>{
          const [col,bg]=f.status==="Paid"?[C.green,C.greenL]:f.status==="Partial"?[C.amber,C.amberL]:[C.red,C.redL];
          return(
            <div key={f.id} style={{background:"#fff",borderRadius:12,padding:12,margin:"0 14px 8px",border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{flex:1}}>
                  <p style={{fontWeight:700,fontSize:14,color:C.t1}}>{f.term}</p>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                    <Pill color={col} bg={bg}>{f.status}</Pill>
                    {f.due_date&&<span style={{fontSize:11,color:C.t3}}>Due {f.due_date}</span>}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <p style={{fontWeight:800,fontSize:16,color:C.t1,fontFamily:"'Outfit',sans-serif"}}>₹{Number(f.amount).toLocaleString()}</p>
                  <button onClick={()=>delFee(f.id)} style={{width:32,height:32,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {Icon.trash}
                  </button>
                </div>
              </div>
              {/* Status toggle */}
              <div style={{display:"flex",gap:6}}>
                {["Paid","Partial","Unpaid"].map(s=>{
                  const [sc,sb]=s==="Paid"?[C.green,C.greenL]:s==="Partial"?[C.amber,C.amberL]:[C.red,C.redL];
                  const active=f.status===s;
                  return(
                    <button key={s} onClick={()=>updateStatus(f.id,s)}
                      style={{flex:1,padding:"5px 4px",borderRadius:8,border:`1.5px solid ${active?sc:C.border}`,background:active?sb:"#fff",color:active?sc:C.t3,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      {s}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  // ── Student list ──
  return(
    <div style={{padding:14,paddingBottom:32}}>
      <div style={{position:"relative",marginBottom:10}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.t3}}>{Icon.search}</div>
        <input style={{width:"100%",padding:"11px 14px 11px 36px",borderRadius:12,border:`1.5px solid ${C.border}`,fontSize:13,color:C.t1,background:"#fff"}} placeholder="Search by name, ID or class…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <p style={{fontSize:12,color:C.t3,marginBottom:10,fontWeight:500}}>{filtered.length} students</p>
      {loading?<EmptyState msg="Loading…"/>:filtered.length===0?<EmptyState msg="No students found"/>:
      filtered.map(st=>(
        <button key={st.id} onClick={()=>openStudent(st)}
          style={{width:"100%",background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,cursor:"pointer",textAlign:"left"}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flex:1,minWidth:0}}>
            <div style={{width:40,height:40,borderRadius:10,background:C.tealL,display:"flex",alignItems:"center",justifyContent:"center",color:C.teal,fontSize:15,fontWeight:700,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
              {(st.name||st.id||"?")[0].toUpperCase()}
            </div>
            <div style={{minWidth:0}}>
              <p style={{fontWeight:700,fontSize:13,color:C.t1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{st.name||"—"}</p>
              <p style={{fontSize:11,color:C.t3}}>ID: {st.id} · Class {st.class||"—"} {st.section||""}</p>
            </div>
          </div>
          <div style={{color:C.t3,flexShrink:0}}>{Icon.back}</div>
        </button>
      ))}
    </div>
  );
}

// ─── ADMIN TEACHERS ────────────────────────────────────────────────────────────
function AdminTeachers(){
  const [teachers,setTeachers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [confirm,setConfirm]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const [msg,setMsg]=useState("");
  const [editing,setEditing]=useState(null);
  const [editData,setEditData]=useState({});
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSaveMsg]=useState("");

  const load=()=>{
    setLoading(true);
    api("users","GET",null,"?role=eq.teacher&order=name.asc")
      .then(d=>setTeachers(d||[])).finally(()=>setLoading(false));
  };
  useEffect(()=>{load();},[]);

  const del=async()=>{
    if(!confirm) return; setDeleting(true);
    try{
      await api("users","DELETE",null,`?id=eq.${confirm.id}`);
      setTeachers(prev=>prev.filter(t=>t.id!==confirm.id));
      setMsg(`${confirm.name||confirm.id} deleted.`);
    }catch{setMsg("Delete failed. Try again.");}
    finally{setDeleting(false); setConfirm(null);}
  };

  const openEdit=t=>{setEditing(t);setEditData({name:t.name||"",password:"",class:t.class||"",section:t.section||"",phone:t.phone||""});setSaveMsg("");};

  const saveEdit=async()=>{
    setSaving(true); setSaveMsg("");
    try{
      const body={name:editData.name.trim()||null,class:editData.class.trim()||null,section:editData.section.trim()||null,phone:editData.phone.trim()||null};
      if(editData.password.trim()) body.password=await sha256(editData.password.trim());
      await api("users","PATCH",body,`?id=eq.${editing.id}`,"return=minimal");
      setTeachers(teachers.map(t=>t.id===editing.id?{...t,...body}:t));
      setSaveMsg("Saved!");
      setTimeout(()=>setEditing(null),800);
    }catch{setSaveMsg("Save failed.");}
    finally{setSaving(false);}
  };

  const ef=(label,key,placeholder)=>(
    <div style={{marginBottom:10}}>
      <label style={{fontSize:11,fontWeight:600,color:C.t2,display:"block",marginBottom:4}}>{label}</label>
      <input value={editData[key]||""} onChange={e=>setEditData(d=>({...d,[key]:e.target.value}))} placeholder={placeholder}
        style={{width:"100%",padding:"9px 12px",borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13,color:C.t1,background:"#fff"}}/>
    </div>
  );

  const filtered=teachers.filter(t=>
    (t.name||"").toLowerCase().includes(search.toLowerCase())||
    (t.id||"").toLowerCase().includes(search.toLowerCase())||
    (t.class||"").toLowerCase().includes(search.toLowerCase())
  );

  return(
    <div style={{padding:14,paddingBottom:32}}>

      {/* Delete modal */}
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:340,boxShadow:"0 24px 64px rgba(0,0,0,.25)"}}>
            <div style={{width:48,height:48,borderRadius:14,background:C.redL,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",color:C.red}}>{Icon.trash}</div>
            <p style={{fontWeight:800,fontSize:17,color:C.t1,textAlign:"center",fontFamily:"'Outfit',sans-serif"}}>Delete Teacher?</p>
            <p style={{fontSize:13,color:C.t3,textAlign:"center",marginTop:6,lineHeight:1.6}}>
              <strong style={{color:C.t1}}>{confirm.name||confirm.id}</strong> will be permanently removed.
            </p>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={()=>setConfirm(null)} style={{flex:1,padding:"11px",borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",color:C.t2,fontWeight:700,fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={del} disabled={deleting} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:C.red,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                {deleting?"Deleting...":"Delete"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Edit modal */}
      {editing&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.6)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div className="fadeUp" style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:520,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{fontWeight:800,fontSize:15,color:C.t1}}>Edit Teacher</p>
              <button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,color:C.t2,fontWeight:600,cursor:"pointer"}}>Close</button>
            </div>
            <div style={{background:"#FEF3C7",borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#B45309",fontWeight:600}}>ID: {editing.id} — ID cannot be changed</div>
            {ef("Full Name","name","Teacher name")}
            {ef("Password","password","Login password")}
            {ef("Class Assigned","class","e.g. 5")}
            {ef("Section Assigned","section","e.g. A")}
            {ef("Phone","phone","Contact number")}
            {saveMsg&&<div style={{background:saveMsg==="Saved!"?C.greenL:C.redL,borderRadius:9,padding:"8px 12px",marginBottom:10,fontSize:12,color:saveMsg==="Saved!"?C.green:C.red,fontWeight:600}}>{saveMsg}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn variant="ghost" onClick={()=>setEditing(null)}>Cancel</Btn>
              <Btn onClick={saveEdit} disabled={saving}>{saving?"Saving...":"Save Changes"}</Btn>
            </div>
          </div>
        </div>
      )}

      <div style={{background:"linear-gradient(135deg,#78350F,#B45309)",borderRadius:16,padding:16,marginBottom:14,display:"flex",alignItems:"center",gap:14,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-30,width:100,height:100,background:"rgba(255,255,255,.07)",borderRadius:50}}/>
        <div style={{width:48,height:48,borderRadius:14,background:"rgba(255,255,255,.18)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,flexShrink:0}}>{Icon.profile}</div>
        <div>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:11,fontWeight:600}}>TOTAL TEACHERS</p>
          <p style={{color:"#fff",fontSize:28,fontWeight:800,fontFamily:"'Outfit',sans-serif",lineHeight:1}}>{loading?"...":teachers.length}</p>
        </div>
      </div>

      <div style={{position:"relative",marginBottom:10}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.t3}}>{Icon.search}</div>
        <input style={{width:"100%",padding:"11px 14px 11px 36px",borderRadius:12,border:`1.5px solid ${C.border}`,fontSize:13,color:C.t1,background:"#fff"}}
          placeholder="Search by name, ID or class..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {msg&&<div style={{background:msg.includes("failed")?C.redL:C.greenL,borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:12,color:msg.includes("failed")?C.red:C.green,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{msg}</div>}
      <p style={{fontSize:12,color:C.t3,marginBottom:10,fontWeight:500}}>{filtered.length} teachers</p>

      {loading?<EmptyState msg="Loading..."/>:filtered.length===0?<EmptyState msg="No teachers found"/>:
      filtered.map(t=>(
        <div key={t.id} style={{background:"#fff",borderRadius:14,padding:13,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:44,height:44,borderRadius:12,background:"#FEF3C7",display:"flex",alignItems:"center",justifyContent:"center",color:"#B45309",fontSize:17,fontWeight:800,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
            {(t.name||t.id||"?")[0].toUpperCase()}
          </div>
          <div onClick={()=>openEdit(t)} style={{flex:1,minWidth:0,cursor:"pointer"}}>
            <p style={{fontWeight:700,fontSize:13,color:"#B45309",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textDecoration:"underline dotted"}}>{t.name||"—"}</p>
            <p style={{fontSize:11,color:C.t3,marginTop:2}}>ID: {t.id}{t.class?` · Class ${t.class}`:""}{ t.section?` ${t.section}`:""}</p>
            {t.phone&&<p style={{fontSize:11,color:C.t3}}>{t.phone}</p>}
          </div>
          <button onClick={()=>{setConfirm(t);setMsg("");}}
            style={{width:36,height:36,borderRadius:10,background:C.redL,border:`1px solid ${C.red}33`,color:C.red,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
            {Icon.trash}
          </button>
        </div>
      ))}
    </div>
  );
}
