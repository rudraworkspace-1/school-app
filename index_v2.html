// ── Teacher: Mark Attendance ──
function TeacherAttendance({cls,sec,teacher}){
  const today=new Date().toISOString().split("T")[0];
  const [date,setDate]=useState(today);
  const [students,setStudents]=useState([]);
  const [loadingSt,setLoadingSt]=useState(true);
  const [attendance,setAttendance]=useState({}); // {student_id: "Present"|"Absent"|"Late"}
  const [existing,setExisting]=useState({}); // already-saved records for the date
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");

  // Load students once
  useEffect(()=>{
    const q=cls&&sec?`?class=eq.${cls}&section=eq.${sec}&role=eq.student&order=name.asc`
      :cls?`?class=eq.${cls}&role=eq.student&order=name.asc`
      :`?role=eq.student&order=name.asc`;
    api("users","GET",null,q).then(d=>{
      const list=d||[];
      setStudents(list);
      // Default everyone to Present
      const def={};
      list.forEach(s=>{def[s.id]="Present";});
      setAttendance(def);
    }).finally(()=>setLoadingSt(false));
  },[]);

  // Reload existing attendance when date changes
  useEffect(()=>{
    if(!students.length) return;
    const ids=students.map(s=>`"${s.id}"`).join(",");
    api("attendance","GET",null,`?date=eq.${date}&student_id=in.(${ids})`)
      .then(rows=>{
        const map={};
        (rows||[]).forEach(r=>{map[r.student_id]=r.status;});
        setExisting(map);
        // Merge into attendance state
        setAttendance(prev=>{
          const next={...prev};
          students.forEach(s=>{if(map[s.id]) next[s.id]=map[s.id];});
          return next;
        });
      });
  },[date,students]);

  const toggle=(id,status)=>setAttendance(p=>({...p,[id]:status}));

  const save=async()=>{
    setSaving(true); setMsg("");
    try{
      const rows=students.map(s=>({student_id:s.id,date,status:attendance[s.id]||"Present"}));
      const res=await fetch(`${SUPABASE_URL}/rest/v1/attendance?on_conflict=student_id,date`,{
        method:"POST",
        headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates,return=minimal"},
        body:JSON.stringify(rows)
      });
      if(!res.ok){
        const err=await res.text();
        // If unique constraint missing, fall back to delete+insert
        if(err.includes("unique")||err.includes("constraint")||err.includes("conflict")){
          // Delete existing records for this date+students then re-insert
          const ids=students.map(s=>s.id).join(",");
          await fetch(`${SUPABASE_URL}/rest/v1/attendance?date=eq.${date}&student_id=in.(${ids})`,{
            method:"DELETE",
            headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
          });
          const res2=await fetch(`${SUPABASE_URL}/rest/v1/attendance`,{
            method:"POST",
            headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},
            body:JSON.stringify(rows)
          });
          if(!res2.ok) throw new Error(await res2.text());
        } else {
          throw new Error(err);
        }
      }
      setMsg("Attendance saved!");
    }catch(e){setMsg("Failed: "+e.message);}
    finally{setSaving(false);}
  };

  const counts={
    Present:Object.values(attendance).filter(v=>v==="Present").length,
    Absent:Object.values(attendance).filter(v=>v==="Absent").length,
    Late:Object.values(attendance).filter(v=>v==="Late").length,
  };

  return(
    <div style={{padding:14,paddingBottom:32}}>
      {/* Date picker */}
      <div style={{background:"#fff",borderRadius:14,padding:14,border:`1px solid ${C.border}`,marginBottom:12}}>
        <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:6}}>Date</label>
        <input type="date" value={date} onChange={e=>{setDate(e.target.value);setMsg("");}}
          style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff"}}/>
      </div>

      {/* Summary pills */}
      {students.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          {[["Present",C.green,C.greenL],["Absent",C.red,C.redL],["Late",C.amber,C.amberL]].map(([s,col,bg])=>(
            <div key={s} style={{background:bg,borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1px solid ${col}22`}}>
              <p style={{fontSize:20,fontWeight:800,color:col,fontFamily:"'Outfit',sans-serif"}}>{counts[s]}</p>
              <p style={{fontSize:10,color:col,fontWeight:700}}>{s.toUpperCase()}</p>
            </div>
          ))}
        </div>
      )}

      {/* Student list */}
      {loadingSt?<EmptyState msg="Loading students…"/>:students.length===0?<EmptyState msg="No students in your class"/>:
      students.map(st=>{
        const status=attendance[st.id]||"Present";
        return(
          <div key={st.id} style={{background:"#fff",borderRadius:12,padding:"10px 12px",marginBottom:8,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:36,height:36,borderRadius:10,background:C.greenL,display:"flex",alignItems:"center",justifyContent:"center",color:C.green,fontSize:14,fontWeight:700,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
                {(st.name||st.id||"?")[0].toUpperCase()}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontWeight:700,fontSize:13,color:C.t1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{st.name||"—"}</p>
                <p style={{fontSize:11,color:C.t3}}>ID: {st.id}</p>
              </div>
              {existing[st.id]&&<span style={{fontSize:10,color:C.t3,fontWeight:500}}>saved</span>}
            </div>
            <div style={{display:"flex",gap:6}}>
              {["Present","Absent","Late"].map(s=>{
                const [col,bg]=s==="Present"?[C.green,C.greenL]:s==="Absent"?[C.red,C.redL]:[C.amber,C.amberL];
                const active=status===s;
                return(
                  <button key={s} onClick={()=>toggle(st.id,s)}
                    style={{flex:1,padding:"7px 4px",borderRadius:8,border:`1.5px solid ${active?col:C.border}`,background:active?bg:"#fff",color:active?col:C.t3,fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .12s"}}>
                    {s}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}

      {students.length>0&&(
        <>
          {msg&&<div style={{background:msg.includes("saved")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:12,color:msg.includes("saved")?C.green:C.red,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{msg}</div>}
          <Btn onClick={save} disabled={saving}>{saving?"Saving…":"Save Attendance"}</Btn>
        </>
      )}
    </div>
  );
}

// ── Teacher: Post Homework ──
function TeacherHomework({cls,sec,teacher}){
  const today=new Date().toISOString().split("T")[0];
  const [subject,setSubject]=useState("");
  const [task,setTask]=useState("");
  const [dueDate,setDueDate]=useState(today);
  const [selSec,setSelSec]=useState(sec||"All");
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [list,setList]=useState([]);
  const [listLoading,setListLoading]=useState(true);

  const loadList=()=>{
    setListLoading(true);
    const q=cls?`?class=eq.${cls}&order=due_date.desc&limit=20`:`?order=due_date.desc&limit=20`;
    api("homework","GET",null,q).then(d=>setList(d||[])).finally(()=>setListLoading(false));
  };
  useEffect(()=>{loadList();},[]);

  const submit=async()=>{
    if(!subject.trim()) return setMsg("Enter a subject");
    if(!task.trim()) return setMsg("Enter the homework task");
    if(!cls) return setMsg("Your account has no class assigned. Contact admin.");
    setLoading(true); setMsg("");
    try{
      const body={class:cls,section:selSec==="All"?null:selSec,subject:subject.trim(),task:task.trim(),due_date:dueDate};
      await api("homework","POST",body,""," return=minimal");
      setMsg("Homework assigned!");
      setSubject(""); setTask(""); setDueDate(today);
      loadList();
    }catch{setMsg("Failed to assign. Try again.");}
    finally{setLoading(false);}
  };

  const del=async(id)=>{
    await api("homework","DELETE",null,`?id=eq.${id}`);
    setList(list.filter(h=>h.id!==id));
  };

  return(
    <div style={{padding:14,paddingBottom:32}}>
      <div style={{background:"#fff",borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
        <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>

        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <div style={{background:C.greenL,borderRadius:20,padding:"5px 14px",border:`1.5px solid ${C.green}`,display:"inline-flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:12,fontWeight:700,color:C.green}}>{cls?`Class ${cls}`:"No class assigned"}</span>
          </div>
          {/* Section toggle if teacher has a section */}
          {sec?(
            <div style={{background:C.PL,borderRadius:20,padding:"5px 14px",border:`1.5px solid ${C.P}`}}>
              <span style={{fontSize:12,fontWeight:700,color:C.P}}>{sec}</span>
            </div>
          ):(
            // No section assigned — let them pick
            <div style={{display:"flex",gap:6}}>
              {["All","A","B","C","D"].map(s=>(
                <button key={s} onClick={()=>setSelSec(s)}
                  style={{padding:"5px 12px",borderRadius:20,border:`1.5px solid ${selSec===s?C.P:C.border}`,background:selSec===s?C.PL:"#fff",color:selSec===s?C.P:C.t2,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  {s==="All"?"All":s}
                </button>
              ))}
            </div>
          )}
        </div>

        <Input label="Subject" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g. Mathematics"/>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Task</label>
          <textarea value={task} onChange={e=>setTask(e.target.value)} placeholder="Describe the homework…"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",height:88,resize:"none",lineHeight:1.6}}/>
        </div>
        <Input type="date" label="Due Date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/>

        {msg&&<div style={{background:msg.includes("!")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("!")?C.green:C.red,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{msg}</div>}
        <Btn onClick={submit} disabled={loading}>{loading?"Assigning…":"Assign Homework"}</Btn>
      </div>

      <SectionLabel>Recent Homework</SectionLabel>
      {listLoading?<EmptyState msg="Loading…"/>:list.length===0?<EmptyState msg="No homework assigned yet"/>:
      list.map(h=>(
        <div key={h.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
              <Pill color={C.green} bg={C.greenL}>{h.subject}</Pill>
              <Pill color={C.P} bg={C.PL}>Class {h.class}{h.section?` · ${h.section}`:""}</Pill>
            </div>
            <p style={{fontSize:13,color:C.t2,lineHeight:1.55}}>{h.task}</p>
            {h.due_date&&<p style={{fontSize:11,color:C.t3,marginTop:4}}>Due {h.due_date}</p>}
          </div>
          <button onClick={()=>del(h.id)} style={{width:32,height:32,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {Icon.trash}
          </button>
        </div>
      ))}

  );

  const [sendItem,setSendItem]=useState(null);
  const [selOtherClass,setSelOtherClass]=useState("");
  const [selOtherSec,setSelOtherSec]=useState("All");
  const [sendLoading,setSendLoading]=useState(false);
  const [sendMsg,setSendMsg]=useState("");

  const loadAllClasses=()=>{
    api("users","GET",null,"?role=eq.student&select=class,section&order=class.asc")
      .then(rows=>{
        if(!Array.isArray(rows)) return;
        const map={};
        rows.forEach(r=>{
          if(!r.class) return;
          if(!map[r.class]) map[r.class]=new Set();
          if(r.section) map[r.class].add(r.section);
        });
        const arr=Object.entries(map)
          .map(([c,secs])=>({cls:c,sections:["All",...Array.from(secs).sort()]}))
          .sort((a,b)=>a.cls.localeCompare(b.cls,undefined,{numeric:true}));
        setAllClasses(arr);
        // Default to teacher's own class if available, else first class
        const own=arr.find(c=>c.cls===cls);
        const def=own||arr[0];
        if(def){
          setSelClass(def.cls);
          setSelSec(sec&&own?sec:"All");
        }
      }).catch(()=>{});
  };

  const loadList=()=>{
    setListLoading(true);
    const q=cls?`?class=eq.${cls}&order=created_at.desc&limit=20`:`?order=created_at.desc&limit=20`;
    api("online_class","GET",null,q)
      .then(d=>setList(Array.isArray(d)?d:[]))
      .catch(()=>setList([]))
      .finally(()=>setListLoading(false));
  };

  useEffect(()=>{loadList();loadAllClasses();},[]);

  const shareSections=allClasses.find(c=>c.cls===selClass)?.sections||["All"];

  const submit=async()=>{
    if(!link.trim()) return setMsg("Paste the class link (Zoom / Meet / Teams…)");
    if(!selClass) return setMsg("Select a class first.");
    setLoading(true); setMsg("");
    try{
      const body={class:selClass,section:selSec==="All"?null:selSec,subject:subject.trim()||null,link:link.trim(),note:note.trim()||null,class_time:classTime.trim()||null};
      await api("online_class","POST",body,"","return=minimal");
      setMsg("Link shared with students!");
      setSubject(""); setLink(""); setNote(""); setClassTime("");
      loadList();
    }catch{setMsg("Failed to share. Try again.");}
    finally{setLoading(false);}
  };

  const del=async(id)=>{
    await api("online_class","DELETE",null,`?id=eq.${id}`);
    setList(list.filter(o=>o.id!==id));
  };

  const openEdit=(o)=>{
    setEditItem(o);
    setEditLink(o.link||"");
    setEditSubject(o.subject||"");
    setEditNote(o.note||"");
    setEditClassTime(o.class_time||"");
    setEditMsg("");
  };

  const saveEdit=async()=>{
    if(!editLink.trim()) return setEditMsg("Link cannot be empty.");
    setEditLoading(true); setEditMsg("");
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/online_class?id=eq.${editItem.id}`,{
        method:"PATCH",
        headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},
        body:JSON.stringify({link:editLink.trim(),subject:editSubject.trim()||null,note:editNote.trim()||null,class_time:editClassTime.trim()||null})
      });
      setList(list.map(o=>o.id===editItem.id?{...o,link:editLink.trim(),subject:editSubject.trim()||null,note:editNote.trim()||null,class_time:editClassTime.trim()||null}:o));
      setEditItem(null);
    }catch{setEditMsg("Failed to save. Try again.");}
    finally{setEditLoading(false);}
  };

  const openSend=(o)=>{
    setSendItem(o);
    setSendMsg("");
    const others=allClasses.filter(c=>!(c.cls===o.class&&(o.section===null||o.section===undefined)));
    if(others.length>0){setSelOtherClass(others[0].cls);setSelOtherSec("All");}
  };

  const sendToClass=async()=>{
    if(!selOtherClass) return setSendMsg("Select a class first.");
    setSendLoading(true); setSendMsg("");
    try{
      const body={class:selOtherClass,section:selOtherSec==="All"?null:selOtherSec,subject:sendItem.subject||null,link:sendItem.link,note:sendItem.note||null,class_time:sendItem.class_time||null};
      await api("online_class","POST",body,"","return=minimal");
      setSendMsg(`Sent to Class ${selOtherClass}${selOtherSec!=="All"?` · ${selOtherSec}`:""}!`);
      loadList();
    }catch{setSendMsg("Failed to send. Try again.");}
    finally{setSendLoading(false);}
  };

  const dateKey=ts=>{try{return new Date(ts).toLocaleDateString("en-CA");}catch{return"Unknown date";}};
  const timeStr=ts=>{try{return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}catch{return"";}};

  const grouped=list.reduce((acc,o)=>{
    const k=dateKey(o.created_at);
    if(!acc[k]) acc[k]=[];
    acc[k].push(o); return acc;
  },{});

  const sendSections=allClasses.find(c=>c.cls===selOtherClass)?.sections||["All"];

  return(
    <div style={{padding:14,paddingBottom:32}}>

      {/* ── Edit Modal ── */}
      {editItem&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 16px"}}>
          <div className="fadeUp" style={{background:"#fff",borderRadius:20,padding:22,width:"100%",maxWidth:460,margin:"0 14px",boxShadow:"0 20px 60px rgba(0,0,0,.25)",maxHeight:"90vh",overflowY:"auto"}}>
            <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:28,height:28,borderRadius:8,background:"#CFFAFE",display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#0891B2",flexShrink:0}}>{Icon.video}</span>
              Edit Link
            </p>
            <Input label="Class Link" value={editLink} onChange={e=>setEditLink(e.target.value)} placeholder="Paste updated link"/>
            <Input label="Subject (optional)" value={editSubject} onChange={e=>setEditSubject(e.target.value)} placeholder="e.g. Mathematics"/>
            <Input label="Class Time (optional)" value={editClassTime} onChange={e=>setEditClassTime(e.target.value)} placeholder="e.g. Today 10:00 AM"/>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Note (optional)</label>
              <textarea value={editNote} onChange={e=>setEditNote(e.target.value)} placeholder="Any instructions…"
                style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",height:64,resize:"none",lineHeight:1.6}}/>
            </div>
            {editMsg&&<div style={{background:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:C.red,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{editMsg}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn variant="ghost" onClick={()=>setEditItem(null)}>Cancel</Btn>
              <Btn onClick={saveEdit} disabled={editLoading} style={{background:editLoading?"#CBD5E1":"#0891B2",boxShadow:"none"}}>{editLoading?"Saving…":"Save"}</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ── Send to Other Class Modal ── */}
      {sendItem&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 16px"}}>
          <div className="fadeUp" style={{background:"#fff",borderRadius:20,padding:22,width:"100%",maxWidth:460,margin:"0 14px",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
            <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:28,height:28,borderRadius:8,background:C.PL,display:"inline-flex",alignItems:"center",justifyContent:"center",color:C.P,flexShrink:0}}>{Icon.check}</span>
              Send to Another Class
            </p>
            <p style={{fontSize:12,color:C.t3,marginBottom:16,wordBreak:"break-all"}}>{sendItem.link}</p>

            {allClasses.length===0
              ?<div style={{background:C.amberL,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.amber,fontWeight:500,display:"flex",gap:6,alignItems:"center",marginBottom:14}}>{Icon.info}No other classes found.</div>
              :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div>
                  <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Class</label>
                  <select value={selOtherClass} onChange={e=>{setSelOtherClass(e.target.value);setSelOtherSec("All");}}
                    style={{width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",fontWeight:600}}>
                    <option value="">Choose…</option>
                    {allClasses.map(c=>(
                      <option key={c.cls} value={c.cls}>Class {c.cls}</option>
                    ))}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Section</label>
                  <select value={selOtherSec} onChange={e=>setSelOtherSec(e.target.value)} disabled={!selOtherClass}
                    style={{width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:selOtherClass?"#fff":"#F1F5F9",fontWeight:600}}>
                    {sendSections.map(s=>(
                      <option key={s} value={s}>{s==="All"?"All Sections":s}</option>
                    ))}
                  </select>
                </div>
              </div>
            }

            {sendMsg&&<div style={{background:sendMsg.includes("!")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:sendMsg.includes("!")?C.green:C.red,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{sendMsg}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn variant="ghost" onClick={()=>{setSendItem(null);setSendMsg("");}}>Close</Btn>
              {allClasses.length>0&&<Btn onClick={sendToClass} disabled={sendLoading} style={{background:sendLoading?"#CBD5E1":C.P,boxShadow:"none"}}>{sendLoading?"Sending…":"Send"}</Btn>}
            </div>
          </div>
        </div>
      )}

      {/* ── Share Form ── */}
      <div style={{background:"#fff",borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
        <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:30,height:30,borderRadius:8,background:"#CFFAFE",display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#0891B2",flexShrink:0}}>{Icon.video}</span>
          Share Online Class Link
        </p>

        {/* Class + Section pickers (dropdowns) */}
        {allClasses.length===0
          ?<div style={{background:C.amberL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:C.amber,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}No classes found. Upload students first.</div>
          :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Class</label>
              <select value={selClass} onChange={e=>{setSelClass(e.target.value);setSelSec("All");}}
                style={{width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",fontWeight:600,appearance:"auto"}}>
                {allClasses.map(c=>(
                  <option key={c.cls} value={c.cls}>Class {c.cls}{c.cls===cls?" ★":""}</option>
                ))}
              </select>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Section</label>
              <select value={selSec} onChange={e=>setSelSec(e.target.value)}
                style={{width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",fontWeight:600,appearance:"auto"}}>
                {shareSections.map(s=>(
                  <option key={s} value={s}>{s==="All"?"All Sections":s}</option>
                ))}
              </select>
            </div>
          </div>
        }

        <Input label="Subject (optional)" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g. Mathematics"/>
        <Input label="Class Link" value={link} onChange={e=>setLink(e.target.value)} placeholder="Paste Zoom / Google Meet / Teams link"/>
        <Input label="Class Time (optional)" value={classTime} onChange={e=>setClassTime(e.target.value)} placeholder="e.g. Today 10:00 AM"/>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Note (optional)</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Any instructions for students…"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",height:70,resize:"none",lineHeight:1.6}}/>
        </div>

        {msg&&<div style={{background:msg.includes("!")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("!")?C.green:C.red,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{msg}</div>}
        <Btn onClick={submit} disabled={loading} style={{background:loading?"#CBD5E1":"#0891B2",boxShadow:loading?"none":"0 2px 8px rgba(8,145,178,.3)"}}>{loading?"Sharing…":"Share Link"}</Btn>
      </div>

      <SectionLabel>Recently Shared (sorted by date)</SectionLabel>
      {listLoading?<EmptyState msg="Loading…"/>:list.length===0?<EmptyState msg="No links shared yet" icon={Icon.video}/>:
      Object.entries(grouped).map(([date,items])=>(
        <div key={date} style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"0 2px"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#CFFAFE",display:"flex",alignItems:"center",justifyContent:"center",color:"#0891B2",flexShrink:0}}>{Icon.cal}</div>
            <p style={{fontSize:12,fontWeight:700,color:"#0891B2"}}>{date}</p>
          </div>
          {items.map(o=>(
            <div key={o.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5,alignItems:"center"}}>
                    {o.subject&&<Pill color="#0891B2" bg="#CFFAFE">{o.subject}</Pill>}
                    <Pill color={C.P} bg={C.PL}>Class {o.class}{o.section?` · ${o.section}`:""}</Pill>
                    <span style={{fontSize:11,color:C.t3,fontWeight:600}}>{timeStr(o.created_at)}</span>
                  </div>
                  <a href={toHref(o.link)} target="_blank" rel="noopener noreferrer"
                    style={{fontSize:13,color:"#0891B2",lineHeight:1.55,wordBreak:"break-all",textDecoration:"underline",display:"inline-flex",alignItems:"center",gap:5}}>
                    {Icon.link}{o.link}
                  </a>
                  {o.note&&<p style={{fontSize:12,color:C.t3,marginTop:4}}>{o.note}</p>}
                  {o.class_time&&<p style={{fontSize:11,color:C.t3,marginTop:4}}>{o.class_time}</p>}
                </div>
                {/* Delete */}
                <button onClick={()=>del(o.id)} style={{width:32,height:32,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {Icon.trash}
                </button>
              </div>
              {/* Edit + Send to class action row */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
                <button onClick={()=>openEdit(o)}
                  style={{padding:"7px 10px",borderRadius:9,border:"none",background:"#0891B2",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                  Edit Link
                </button>
                <button onClick={()=>openSend(o)}
                  style={{padding:"7px 10px",borderRadius:9,border:"none",background:C.P,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                  Send to Class
                </button>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{try{const u=JSON.parse(safeStorage.getItem("cps_user"));return u?safeUser(u):null;}catch{return null;}});
  const onLogin=u=>setUser(safeUser(u));
  const onLogout=()=>{safeStorage.removeItem("cps_user");setUser(null);};
  if(!user) return <Login onLogin={onLogin}/>;
  if(user.role==="admin") return <AdminPanel user={user} onLogout={onLogout} onUpdateUser={u=>{safeStorage.setItem("cps_user",JSON.stringify(u));setUser(u);}}/>;
  if(user.role==="teacher") return <TeacherPanel user={user} onLogout={onLogout}/>;
  return <StudentDash user={user} onLogout={onLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
const _bl=document.getElementById("boot-loader");
if(_bl) _bl.remove();
</script>
</body>
</html>
