<style>
#load-error{display:none;position:fixed;inset:0;background:#312E81;color:#fff;font-family:sans-serif;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;z-index:9999;}
#load-error h2{font-size:20px;margin-bottom:12px;}
#load-error p{font-size:14px;opacity:.75;max-width:320px;line-height:1.6;}
#boot-loader{position:fixed;inset:0;background:#F0F2F8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9998;}
#boot-loader .spin{width:34px;height:34px;border-radius:50%;border:3px solid #E0E4F5;border-top-color:#4F46E5;animation:boot-spin .8s linear infinite;}
@keyframes boot-spin{to{transform:rotate(360deg)}}
#boot-loader span{font-family:sans-serif;font-size:13px;color:#64748B;}
</style>
<div id="load-error">
  <h2>⚠️ Could not load app</h2>
  <p>Something went wrong loading the app.<br/><br/>Try opening the file in Chrome or Firefox.</p>
</div>
<div id="boot-loader"><div class="spin"></div><span>Loading…</span></div>
<script>
function showLoadError(extra){
  var el=document.getElementById('load-error');
  if(el){
    if(extra){var p=el.querySelector('p');if(p)p.innerHTML+=extra;}
    el.style.display='flex';
  }
  var root=document.getElementById('root');
  if(root) root.style.display='none';
  var bl=document.getElementById('boot-loader');
  if(bl) bl.remove();
}
window.addEventListener('load',function(){
  if(!window.React||!window.ReactDOM){
    showLoadError('');
    return;
  }
  // Pre-apply dark mode CSS vars before React mounts to avoid flash
  try{
    var savedDark=localStorage.getItem('cps_dark');
    var dark=(savedDark===null)?true:savedDark==='1';
    if(dark){
      var r=document.documentElement;
      r.style.setProperty('--c-bg','#0F172A');
      r.style.setProperty('--c-card','#1E293B');
      r.style.setProperty('--c-t1','#F1F5F9');
      r.style.setProperty('--c-t2','#94A3B8');
      r.style.setProperty('--c-t3','#475569');
      r.style.setProperty('--c-border','#334155');
      document.body.style.background='#0F172A';
    }
  }catch(e){}
  // Safety net: if boot-loader is still visible after 8s, something
  // failed silently (e.g. Babel transpile error on restricted URL).
  setTimeout(function(){
    var bl=document.getElementById('boot-loader');
    if(bl&&bl.parentNode){
      showLoadError('');
    }
  },8000);
});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;}
body{font-family:'Inter',sans-serif;background:#F0F2F8;overscroll-behavior:none;color:#0F172A;}
input,textarea,button,select{font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}

/* ── Responsive layout ──
   The app's internal screens are built as a single vertical column (tile
   grids, button rows, forms). The column now fills the viewport fluidly at
   every size — phone, wide/landscape phone, tablet — so there's never a
   patch of empty unused space on the sides. Only on genuinely large desktop
   monitors does the column cap its width and center itself, since an
   uncapped column would otherwise stretch uncomfortably wide for reading. */
#root{width:100%;}
@media (min-width:1100px){
  body{display:flex;justify-content:center;background:linear-gradient(160deg,#E0E4F5 0%,#EEF1FA 100%);}
  #root{max-width:720px;box-shadow:0 0 0 1px rgba(15,23,42,.06),0 24px 70px rgba(15,23,42,.1);}
}

/* Press feedback */
.press{transition:transform .1s,opacity .1s;}
.press:active{transform:scale(.96);opacity:.9;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fadeUp{animation:fadeUp .28s ease both;}
.slideIn{animation:slideIn .22s ease both;}

/* Stagger delays */
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}


/* Custom focus */
input:focus,textarea:focus,select:focus{outline:none;border-color:#4F46E5!important;box-shadow:0 0 0 3px rgba(79,70,229,.12);}

/* CSS custom properties (overridden at runtime by React dark-mode) */
:root{
  --c-bg:#F0F2F8;
  --c-card:#FFFFFF;
  --c-t1:#0F172A;
  --c-t2:#475569;
  --c-t3:#94A3B8;
  --c-border:#E2E8F0;
}

</style>

const _bl = document.getElementById("boot-loader");
if (_bl)
    _bl.remove();

</script>
