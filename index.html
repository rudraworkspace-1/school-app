<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;}
body{font-family:'Inter',sans-serif;background:#F0F2F8;overscroll-behavior:none;color:#0F172A;}
input,textarea,button,select{font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}

/* Press feedback */
.press{transition:transform .1s,opacity .1s;}
.press:active{transform:scale(.96);opacity:.9;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fadeUp{animation:fadeUp .28s ease both;}
.slideIn{animation:slideIn .22s ease both;}

/* Stagger delays */
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

/* Custom focus */
input:focus,textarea:focus,select:focus{outline:none;border-color:#4F46E5!important;box-shadow:0 0 0 3px rgba(79,70,229,.12);}
</style>

const api=async(table,method="GET",body=null,query="",prefer="")=>{
  const h={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"};
  if(prefer) h["Prefer"]=prefer;
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{method,headers:h,body:body?JSON.stringify(body):null});
  if(method==="DELETE"||method==="PATCH") return null;
  const t=await r.text(); return t?JSON.parse(t):[];
};

const parseXLSX=f=>new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"binary"});const ws=wb.Sheets[wb.SheetNames[0]];res(XLSX.utils.sheet_to_json(ws));}catch(err){rej(err);}};
  r.onerror=rej; r.readAsBinaryString(f);
});

function Header({title,sub,onBack,accent=C.P}){

function Btn({children,onClick,disabled,variant="primary",style={}}){
  const base={width:"100%",padding:"13px 16px",borderRadius:12,border:"none",fontSize:14,fontWeight:600,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"opacity .15s"};
  const vars={
    primary:{background:disabled?"#CBD5E1":C.P,color:"#fff",boxShadow:disabled?"none":"0 2px 8px rgba(79,70,229,.3)"},
    danger:{background:disabled?"#CBD5E1":C.red,color:"#fff",boxShadow:"none"},
    ghost:{background:"transparent",color:C.t2,border:`1.5px solid ${C.border}`},
  };
  return <button onClick={onClick} disabled={disabled} style={{...base,...vars[variant],...style}}>{children}</button>;
}

function Input({label,value,onChange,placeholder,type="text",style={}}){

    <div style={{marginBottom:12}}>

// ─── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [id,setId]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPw,setShowPw]=useState(false);

  const login=async()=>{
    if(!id.trim()||!pw.trim()) return setErr("Please enter your ID and password");
    setLoading(true); setErr("");
    try{
      const data=await api("users","GET",null,`?id=eq.${id.trim()}&password=eq.${pw.trim()}&select=*`);
      if(!data||data.length===0) return setErr("Invalid ID or password");
      localStorage.setItem("cps_user",JSON.stringify(data[0]));
      onLogin(data[0]);
    }catch(e){setErr("DEBUG ERROR: "+(e&&e.message?e.message:String(e)));}
    finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#312E81 0%,#4338CA 45%,#6366F1 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      {/* Background patterns */}
      <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,backgroundImage:"radial-gradient(circle at 20% 20%, rgba(255,255,255,.06) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255,255,255,.04) 0%, transparent 50%)"}}/>
      <div style={{position:"absolute",top:-80,right:-80,width:240,height:240,border:"1px solid rgba(255,255,255,.08)",borderRadius:120}}/>
      <div style={{position:"absolute",bottom:-60,left:-60,width:180,height:180,border:"1px solid rgba(255,255,255,.06)",borderRadius:90}}/>

      {/* Logo */}
      <div className="fadeUp" style={{position:"relative",zIndex:1,textAlign:"center",marginBottom:32}}>
        <div style={{width:72,height:72,borderRadius:20,background:"rgba(255,255,255,.15)",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",color:"#fff"}}>
          {Icon.grad}
        </div>
        <h1 style={{color:"#fff",fontSize:20,fontWeight:800,fontFamily:"'Outfit',sans-serif",letterSpacing:-.3}}>{SCHOOL}</h1>
        <p style={{color:"rgba(255,255,255,.5)",fontSize:12,marginTop:4}}>{ADDR}</p>
      </div>

      {/* Card */}
      <div className="fadeUp d2" style={{position:"relative",zIndex:1,background:"#fff",borderRadius:24,padding:28,width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,.25)"}}>
        <p style={{fontFamily:"'Outfit',sans-serif",fontWeight:800,fontSize:22,color:C.t1,marginBottom:4}}>Sign in</p>
        <p style={{fontSize:13,color:C.t3,marginBottom:24}}>Access your school account</p>

        <Input label="Student / Admin ID" value={id} onChange={e=>setId(e.target.value)} placeholder="Enter your ID"/>

        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Password</label>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}
              placeholder="Enter password"
              style={{width:"100%",padding:"11px 44px 11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff"}}/>
            <button onClick={()=>setShowPw(!showPw)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.t3}}>
              {showPw?Icon.eyeOff:Icon.eye}
            </button>
          </div>
        </div>

        {err&&<div style={{background:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.red,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>{Icon.info}{err}</div>}

        <Btn onClick={login} disabled={loading}>{loading?"Signing in…":"Sign In"}</Btn>
      </div>
      <p className="fadeUp d3" style={{color:"rgba(255,255,255,.3)",fontSize:11,marginTop:20,position:"relative",zIndex:1}}>Free · Ad-free · Auto-save</p>
    </div>
  );
}

      <div style={{background:"linear-gradient(160deg,#3730A3 0%,#4338CA 50%,#4F46E5 100%)",padding:"20px 16px 22px",position:"relative",overflow:"hidden",flexShrink:0}}>
        <div style={{position:"absolute",top:-50,right:-50,width:160,height:160,background:"rgba(255,255,255,.05)",borderRadius:80}}/>
        <div style={{position:"absolute",bottom:-30,left:120,width:120,height:120,background:"rgba(255,255,255,.04)",borderRadius:60}}/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#F59E0B,#D97706)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12,boxShadow:"0 4px 14px rgba(245,158,11,.4)",color:"#fff"}}>
            {Icon.grad}
          </div>
          <p style={{color:"#fff",fontSize:19,fontWeight:800,fontFamily:"'Outfit',sans-serif",letterSpacing:-.2}}>{SCHOOL}</p>
          <p style={{color:"rgba(255,255,255,.5)",fontSize:11,marginTop:2}}>{ADDR}</p>

// ─── FEES ──────────────────────────────────────────────────────────────────────
function FeesScreen({user,onBack}){
  const [data,setData]=useState([]);

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg}}>

            <p style={{fontSize:12,color:"rgba(255,255,255,.55)",marginTop:6}}>{user.name||user.id} · {user.class?`Class ${user.class}`:""}  {user.section||""}</p>
            {/* Progress bar */}
            <div style={{marginTop:14,height:5,background:"rgba(255,255,255,.2)",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:5,width:`${paidPct}%`,background:"#4ADE80",borderRadius:4,transition:"width .6s ease"}}/>
            </div>
            <p style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:6}}>{paidPct}% paid</p>
          </div>

          {/* 3-column breakdown */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:4}}>
            <div style={{background:C.greenL,borderRadius:14,padding:12,border:`1px solid ${C.green}22`}}>
              <p style={{fontSize:10,color:C.green,fontWeight:700,marginBottom:3}}>PAID</p>
              <p style={{fontSize:18,fontWeight:800,color:C.green,fontFamily:"'Outfit',sans-serif"}}>₹{paid.toLocaleString()}</p>
            </div>
            {partial>0&&(
              <div style={{background:C.amberL,borderRadius:14,padding:12,border:`1px solid ${C.amber}22`}}>
                <p style={{fontSize:10,color:C.amber,fontWeight:700,marginBottom:3}}>PARTIAL</p>
                <p style={{fontSize:18,fontWeight:800,color:C.amber,fontFamily:"'Outfit',sans-serif"}}>₹{partial.toLocaleString()}</p>
              </div>
            )}
            <div style={{background:C.redL,borderRadius:14,padding:12,border:`1px solid ${C.red}22`}}>
              <p style={{fontSize:10,color:C.red,fontWeight:700,marginBottom:3}}>PENDING</p>
              <p style={{fontSize:18,fontWeight:800,color:C.red,fontFamily:"'Outfit',sans-serif"}}>₹{pending.toLocaleString()}</p>
            </div>
          </div>
        </div>
      )}

      <div style={{padding:"6px 0 24px"}}>
        <SectionLabel>Fee Breakdown</SectionLabel>
        {loading?<EmptyState msg="Loading…"/>:data.length===0?<EmptyState msg="No fee records"/>:
        data.map((f,i)=>{
          const [col,bg]=f.status==="Paid"?[C.green,C.greenL]:f.status==="Partial"?[C.amber,C.amberL]:[C.red,C.redL];
          return(
            <Card key={f.id} className={`fadeUp d${Math.min(i+1,5)}`} style={{marginTop:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                  <p style={{fontWeight:700,fontSize:14,color:C.t1}}>{f.term}</p>
                  {f.due_date&&<p style={{fontSize:11,color:C.t3,marginTop:3}}>Due: {f.due_date}</p>}
                </div>
                <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                  <p style={{fontWeight:800,fontSize:17,color:C.t1,fontFamily:"'Outfit',sans-serif"}}>₹{Number(f.amount).toLocaleString()}</p>
                  <Pill color={col} bg={bg}>{f.status}</Pill>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

          ))}
        </Card>
      </div>
    </div>
  );
}

function AdminHomework(){
  const today=new Date().toISOString().split("T")[0];
  const [classes,setClasses]=useState([]); // [{class,sections:[]}]
  const [selClass,setSelClass]=useState("");
  const [selSection,setSelSection]=useState("All");
  const [subject,setSubject]=useState("");
  const [task,setTask]=useState("");
  const [dueDate,setDueDate]=useState(today);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [list,setList]=useState([]);
  const [listLoading,setListLoading]=useState(true);

  // Load distinct class+section combos from users table
  useEffect(()=>{
    api("users","GET",null,"?role=eq.student&select=class,section&order=class.asc,section.asc")
      .then(rows=>{
        const map={};
        (rows||[]).forEach(r=>{
          if(!r.class) return;
          if(!map[r.class]) map[r.class]=new Set();
          if(r.section) map[r.class].add(r.section);
        });
        const arr=Object.entries(map).map(([c,secs])=>({cls:c,sections:["All",...Array.from(secs).sort()]}));
        setClasses(arr);
        if(arr.length>0){setSelClass(arr[0].cls);setSelSection("All");}
      });
    loadList();
  },[]);

  const loadList=()=>{
    setListLoading(true);
    api("homework","GET",null,"?order=due_date.desc&limit=30")
      .then(d=>setList(d||[]))
      .finally(()=>setListLoading(false));
  };

  const sections=classes.find(c=>c.cls===selClass)?.sections||["All"];

  const submit=async()=>{
    if(!selClass) return setMsg("No classes found — upload students first");
    if(!subject.trim()) return setMsg("Enter a subject");
    if(!task.trim()) return setMsg("Enter the homework task");
    setLoading(true); setMsg("");
    try{
      const body={class:selClass,section:selSection==="All"?null:selSection,subject:subject.trim(),task:task.trim(),due_date:dueDate};
      await api("homework","POST",body,""," return=minimal");
      setMsg("Homework assigned!");
      setSubject(""); setTask(""); setDueDate(today);
      loadList();
    }catch{setMsg("Failed to assign homework");}
    finally{setLoading(false);}
  };

  const del=async(id)=>{
    await api("homework","DELETE",null,`?id=eq.${id}`);
    setList(list.filter(h=>h.id!==id));
  };

  // Group list by date
  const grouped=list.reduce((acc,h)=>{
    const k=h.due_date||"No date";
    if(!acc[k]) acc[k]=[];
    acc[k].push(h); return acc;
  },{});

  return(
    <div style={{padding:14,paddingBottom:32}}>

      {/* ── Assign form ── */}
      <div style={{background:"#fff",borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
        <p style={{fontWeight:800,fontSize:15,color:C.t1,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:30,height:30,borderRadius:8,background:C.blueL,display:"inline-flex",alignItems:"center",justifyContent:"center",color:C.blue,flexShrink:0}}>{Icon.book}</span>
          Assign Homework
        </p>

        {/* Class selector */}
        <p style={{fontSize:12,fontWeight:700,color:C.t2,marginBottom:8}}>Select Class</p>
        {classes.length===0
          ? <div style={{background:C.amberL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:C.amber,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info} No classes found. Upload students first.</div>
          : <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {classes.map(c=>(
                <button key={c.cls} onClick={()=>{setSelClass(c.cls);setSelSection("All");}}
                  style={{padding:"7px 16px",borderRadius:20,border:`1.5px solid ${selClass===c.cls?C.blue:C.border}`,background:selClass===c.cls?C.blueL:"#fff",color:selClass===c.cls?C.blue:C.t2,fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
                  Class {c.cls}
                </button>
              ))}
            </div>
        }

        {/* Section selector */}
        {selClass&&(
          <>
            <p style={{fontSize:12,fontWeight:700,color:C.t2,marginBottom:8}}>Select Section</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {sections.map(s=>(
                <button key={s} onClick={()=>setSelSection(s)}
                  style={{padding:"7px 16px",borderRadius:20,border:`1.5px solid ${selSection===s?C.P:C.border}`,background:selSection===s?C.PL:"#fff",color:selSection===s?C.P:C.t2,fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
                  {s==="All"?"All Sections":s}
                </button>
              ))}
            </div>
          </>
        )}

        {/* Subject */}
        <Input label="Subject" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g. Mathematics"/>

        {/* Task */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Homework Task</label>
          <textarea value={task} onChange={e=>setTask(e.target.value)} placeholder="Describe the homework…"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",height:90,resize:"none",lineHeight:1.6}}/>
        </div>

        {/* Due Date */}
        <Input type="date" label="Due Date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/>

        {msg&&(
          <div style={{background:msg.includes("!")?C.greenL:C.amberL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("!")?C.green:C.amber,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>
            {Icon.info}{msg}
          </div>
        )}

        <Btn onClick={submit} disabled={loading||!selClass}>
          {loading?"Assigning…":"Assign Homework"}
        </Btn>
      </div>

      {/* ── Recent homework list ── */}
      <SectionLabel>Recent Homework</SectionLabel>
      {listLoading?<EmptyState msg="Loading…"/>:list.length===0?<EmptyState msg="No homework assigned yet"/>:
      Object.entries(grouped).map(([date,items])=>(
        <div key={date} style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"0 2px"}}>
            <div style={{width:28,height:28,borderRadius:8,background:C.blueL,display:"flex",alignItems:"center",justifyContent:"center",color:C.blue,flexShrink:0}}>{Icon.cal}</div>
            <p style={{fontSize:12,fontWeight:700,color:C.blue}}>Due {date}</p>
          </div>
          {items.map(h=>(
            <div key={h.id} style={{background:"#fff",borderRadius:12,padding:"12px 12px",marginBottom:6,border:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
                  <Pill color={C.blue} bg={C.blueL}>{h.subject}</Pill>
                  <Pill color={C.P} bg={C.PL}>Class {h.class}{h.section?` · ${h.section}`:""}</Pill>
                </div>
                <p style={{fontSize:13,color:C.t2,lineHeight:1.55,marginTop:4}}>{h.task}</p>
              </div>
              <button onClick={()=>del(h.id)} style={{width:32,height:32,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {Icon.trash}
              </button>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function AdminUpload(){
  const [type,setType]=useState("students");
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const chosen=UPLOAD_TYPES.find(t=>t.key===type);

  const handleFile=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setFile(f); setMsg(""); setPreview(null);
    try{const rows=await parseXLSX(f);setPreview(rows.slice(0,2));}catch{setMsg("Could not read file");}
  };

  const upload=async()=>{
    if(!file) return; setLoading(true); setMsg("");
    try{
      const rows=await parseXLSX(file);
      let processed=rows;
      if(type==="students") processed=rows.map(r=>({...r,role:"student",transport_opted:String(r.transport_opted||"").toLowerCase()==="yes"}));
      const res=await fetch(`${SUPABASE_URL}/rest/v1/${chosen.table}${type==="students"?"?on_conflict=id":""}`,{
        method:"POST",
        headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:type==="students"?"resolution=merge-duplicates":"return=minimal"},
        body:JSON.stringify(processed)
      });
      if(!res.ok) throw new Error(await res.text());
      setMsg(`${rows.length} ${chosen.label} records uploaded successfully`);
      setFile(null); setPreview(null);
    }catch(e){setMsg("Upload failed: "+e.message);}
    finally{setLoading(false);}
  };

  return(
    <div style={{padding:14}}>

      {/* ── Upload zone FIRST ── */}
      <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,width:"100%",padding:20,borderRadius:14,border:`2px dashed ${file?C.P:C.border}`,background:file?C.PL:"#fff",color:C.t2,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:12,textAlign:"center",transition:"all .15s"}}>
        <div style={{width:44,height:44,borderRadius:12,background:file?C.P:C.PL,display:"flex",alignItems:"center",justifyContent:"center",color:file?"#fff":C.P,transition:"all .15s"}}>
          {Icon.upload}
        </div>
        <span style={{color:file?C.P:C.t2}}>{file?file.name:"Tap to choose Excel file (.xlsx)"}</span>
        <span style={{fontSize:11,color:C.t3,fontWeight:400}}>Supported: .xlsx, .xls</span>
        <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleFile}/>
      </label>

      {preview&&(
        <div style={{background:"#fff",borderRadius:12,padding:12,marginBottom:10,border:`1px solid ${C.border}`}}>
          <p style={{fontWeight:700,fontSize:12,color:C.t2,marginBottom:6}}>Preview (first 2 rows)</p>
          {preview.map((row,i)=><p key={i} style={{fontSize:10,color:C.t3,lineHeight:1.5,wordBreak:"break-all",marginBottom:4,fontFamily:"monospace"}}>{JSON.stringify(row)}</p>)}
        </div>
      )}

      {/* ── Type selector ── */}
      <SectionLabel>Select Data Type</SectionLabel>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {UPLOAD_TYPES.map(t=>(
          <button key={t.key} onClick={()=>{setType(t.key);setFile(null);setPreview(null);setMsg("");}}
            style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${type===t.key?C.P:C.border}`,background:type===t.key?C.PL:"#fff",color:type===t.key?C.P:C.t2,fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{background:C.PL,borderRadius:12,padding:12,marginBottom:12,border:`1px solid ${C.P}33`,display:"flex",gap:8}}>
        <div style={{color:C.P,flexShrink:0,marginTop:1}}>{Icon.info}</div>
        <div>
          <p style={{fontSize:11,fontWeight:700,color:C.P,marginBottom:3}}>Required columns for {chosen.label}</p>
          <p style={{fontSize:11,color:C.t2,lineHeight:1.7}}>{chosen.note}</p>
        </div>
      </div>

      {msg&&<div style={{background:msg.includes("successfully")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("successfully")?C.green:C.red,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
        {Icon.info}{msg}
      </div>}

      {file&&<Btn onClick={upload} disabled={loading}>{Icon.upload}{loading?"Uploading…":"Upload "+chosen.label}</Btn>}
    </div>
  );
}

function AdminStudents(){
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [confirm,setConfirm]=useState(null); // student to delete
  const [deleting,setDeleting]=useState(false);
  useEffect(()=>{api("users","GET",null,"?role=eq.student&order=name.asc").then(d=>setStudents(d||[])).finally(()=>setLoading(false));},[]);
  const filtered=students.filter(s=>(s.name||"").toLowerCase().includes(search.toLowerCase())||(s.id||"").toLowerCase().includes(search.toLowerCase())||(s.class||"").toLowerCase().includes(search.toLowerCase()));

  const removeStudent=async()=>{
    if(!confirm) return;
    setDeleting(true);
    try{
      // Delete the user and cascade their related records
      await api("users","DELETE",null,`?id=eq.${confirm.id}`);
      setStudents(students.filter(s=>s.id!==confirm.id));
      setConfirm(null);
    }catch(e){alert("Failed to remove student");}
    finally{setDeleting(false);}
  };

  return(
    <div style={{padding:14}}>
      {/* Confirm delete modal */}
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 24px"}}>
          <div className="fadeUp" style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:460,margin:"0 14px",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
            <div style={{width:48,height:48,borderRadius:14,background:C.redL,display:"flex",alignItems:"center",justifyContent:"center",color:C.red,margin:"0 auto 14px"}}>
              {Icon.trash}
            </div>
            <p style={{fontWeight:800,fontSize:16,color:C.t1,textAlign:"center",marginBottom:6}}>Remove Student?</p>
            <p style={{fontSize:13,color:C.t2,textAlign:"center",lineHeight:1.6,marginBottom:20}}>
              <strong>{confirm.name||confirm.id}</strong> (ID: {confirm.id}) will be permanently removed. This cannot be undone.
            </p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Btn>
              <Btn variant="danger" onClick={removeStudent} disabled={deleting}>{deleting?"Removing…":"Yes, Remove"}</Btn>
            </div>
          </div>
        </div>
      )}

      <div style={{position:"relative",marginBottom:10}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.t3}}>{Icon.search}</div>
        <input style={{width:"100%",padding:"11px 14px 11px 36px",borderRadius:12,border:`1.5px solid ${C.border}`,fontSize:13,color:C.t1,background:"#fff"}} placeholder="Search by name, ID or class…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <p style={{fontSize:12,color:C.t3,marginBottom:10,fontWeight:500}}>{filtered.length} students</p>
      {loading?<EmptyState msg="Loading…"/>:filtered.length===0?<EmptyState msg="No students found"/>:
      filtered.map(st=>(
        <div key={st.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flex:1,minWidth:0}}>
            <div style={{width:38,height:38,borderRadius:10,background:C.PL,display:"flex",alignItems:"center",justifyContent:"center",color:C.P,fontSize:14,fontWeight:700,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
              {(st.name||st.id||"?")[0].toUpperCase()}
            </div>
            <div style={{minWidth:0}}>
              <p style={{fontWeight:700,fontSize:13,color:C.t1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{st.name||"—"}</p>
              <p style={{fontSize:11,color:C.t3}}>ID: {st.id} · Class {st.class||"—"} {st.section||""}</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            {st.transport_opted&&<Pill color={C.amber} bg={C.amberL}>Bus</Pill>}
            <button onClick={()=>setConfirm(st)} style={{width:34,height:34,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {Icon.trash}
            </button>
          </div>
        </div>
      ))}
      <div style={{paddingBottom:16}}/>
    </div>
  );
}

function AdminPost(){
  const [title,setTitle]=useState("");
  const [desc,setDesc]=useState("");
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [list,setList]=useState([]);
  const load=()=>api("announcements","GET",null,"?order=date.desc&limit=15").then(d=>setList(d||[]));
  useEffect(()=>{load();},[]);
  const post=async()=>{
    if(!title.trim()) return setMsg("Enter a title");
    setLoading(true);
    try{await api("announcements","POST",{title:title.trim(),description:desc.trim()||null,date});setMsg("Posted successfully");setTitle("");setDesc("");load();}
    catch{setMsg("Failed to post");}
    finally{setLoading(false);}
  };
  const del=async(id)=>{await api("announcements","DELETE",null,`?id=eq.${id}`);setList(list.filter(a=>a.id!==id));};
  return(
    <div style={{padding:14}}>
      <Card style={{margin:"0 0 14px"}}>
        <p style={{fontWeight:700,fontSize:14,color:C.t1,marginBottom:12}}>New Announcement</p>
        <Input label="Title" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Enter title"/>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:5}}>Description (optional)</label>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Add details…"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,color:C.t1,background:"#fff",height:80,resize:"none"}}/>
        </div>
        <Input type="date" label="Date" value={date} onChange={e=>setDate(e.target.value)}/>
        {msg&&<div style={{background:msg.includes("success")?C.greenL:C.redL,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:msg.includes("success")?C.green:C.red,fontWeight:500,display:"flex",gap:6,alignItems:"center"}}>{Icon.info}{msg}</div>}
        <Btn onClick={post} disabled={loading}>{loading?"Posting…":"Post Announcement"}</Btn>
      </Card>
      <SectionLabel>Recent Posts</SectionLabel>
      {list.map(a=>(
        <div key={a.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{flex:1}}>
            <p style={{fontWeight:700,fontSize:13,color:C.t1}}>{a.title}</p>
            <p style={{fontSize:11,color:C.t3,marginTop:2}}>{a.date}</p>
          </div>
          <button onClick={()=>del(a.id)} style={{width:34,height:34,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {Icon.trash}
          </button>
        </div>
      ))}
      <div style={{paddingBottom:16}}/>
    </div>
  );
}

function AdminManage(){
  const [section,setSection]=useState("homework");
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(false);
  const tables={homework:"homework",calendar:"calendar",comments:"comments",fees:"fees"};
  const load=async(sec)=>{setLoading(true);setList([]);try{const d=await api(tables[sec],"GET",null,"?order=created_at.desc&limit=20");setList(d||[]);}finally{setLoading(false);}};
  useEffect(()=>{load(section);},[section]);
  const del=async(id)=>{await api(tables[section],"DELETE",null,`?id=eq.${id}`);setList(list.filter(i=>i.id!==id));};
  const renderItem=(item)=>{
    if(section==="homework") return `${item.class} · ${item.subject} · ${item.task}`;
    if(section==="calendar") return `${item.event_date} · ${item.event_name}`;
    if(section==="comments") return `${item.student_id} · ${item.from_name}: ${item.message}`;
    if(section==="fees") return `${item.student_id} · ${item.term} · ₹${item.amount} · ${item.status}`;
    return "";
  };
  return(
    <div style={{padding:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {Object.keys(tables).map(k=>(
          <button key={k} onClick={()=>setSection(k)}
            style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${section===k?C.P:C.border}`,background:section===k?C.PL:"#fff",color:section===k?C.P:C.t2,fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
            {k.charAt(0).toUpperCase()+k.slice(1)}
          </button>
        ))}
      </div>
      {loading?<EmptyState msg="Loading…"/>:list.length===0?<EmptyState msg="No records found"/>:
      list.map(item=>(
        <div key={item.id} style={{background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <p style={{fontSize:12,color:C.t2,flex:1,lineHeight:1.6}}>{renderItem(item)}</p>
          <button onClick={()=>del(item.id)} style={{width:34,height:34,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {Icon.trash}
          </button>
        </div>
      ))}
      <div style={{paddingBottom:16}}/>
    </div>
  );
}

// ─── ADMIN FEES ────────────────────────────────────────────────────────────────
function AdminFees(){
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null); // student object
  const [fees,setFees]=useState([]);
  const [feesLoading,setFeesLoading]=useState(false);

  useEffect(()=>{
    api("users","GET",null,"?role=eq.student&order=name.asc")
      .then(d=>setStudents(d||[]))
      .finally(()=>setLoading(false));
  },[]);

  const openStudent=async(st)=>{
    setSelected(st); setFees([]); setFeesLoading(true);
    api("fees","GET",null,`?student_id=eq.${st.id}&order=due_date.asc`)
      .then(d=>setFees(d||[]))
      .finally(()=>setFeesLoading(false));
  };

  const delFee=async(id)=>{
    await api("fees","DELETE",null,`?id=eq.${id}`);
    setFees(fees.filter(f=>f.id!==id));
  };

  const filtered=students.filter(s=>
    (s.name||"").toLowerCase().includes(search.toLowerCase())||
    (s.id||"").toLowerCase().includes(search.toLowerCase())||
    (s.class||"").toLowerCase().includes(search.toLowerCase())
  );

  // ── Student fee detail view ──
  if(selected){
    const total=fees.reduce((a,b)=>a+(Number(b.amount)||0),0);
    const paid=fees.filter(f=>f.status==="Paid").reduce((a,b)=>a+(Number(b.amount)||0),0);
    const pending=total-paid;
    const pct=total?Math.round((paid/total)*100):0;
    return(
      <div style={{paddingBottom:32}}>
        {/* Student header */}
        <div style={{background:"linear-gradient(135deg,#1e3a5f,#1D4ED8)",margin:"14px 14px 0",borderRadius:16,padding:16}}>
          <button onClick={()=>setSelected(null)} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"5px 12px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:12}}>
            {Icon.back}<span>All Students</span>
          </button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:800,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
              {(selected.name||selected.id||"?")[0].toUpperCase()}
            </div>
            <div>
              <p style={{color:"#fff",fontWeight:800,fontSize:15,fontFamily:"'Outfit',sans-serif"}}>{selected.name||"—"}</p>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:11,marginTop:2}}>ID: {selected.id} · Class {selected.class||"—"} {selected.section||""}</p>
            </div>
          </div>
        </div>

        {/* Summary */}
        {fees.length>0&&(
          <div style={{margin:"10px 14px 0"}}>
            <div style={{background:"#fff",borderRadius:14,padding:14,border:`1px solid ${C.border}`,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <p style={{fontSize:11,color:C.t3,fontWeight:600}}>TOTAL FEES</p>
                  <p style={{fontSize:26,fontWeight:800,color:C.t1,fontFamily:"'Outfit',sans-serif"}}>₹{total.toLocaleString()}</p>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{fontSize:11,color:C.green,fontWeight:600}}>PAID</p>
                  <p style={{fontSize:20,fontWeight:800,color:C.green,fontFamily:"'Outfit',sans-serif"}}>₹{paid.toLocaleString()}</p>
                </div>
              </div>
              <div style={{height:6,background:C.border,borderRadius:4,overflow:"hidden",marginBottom:6}}>
                <div style={{height:6,width:`${pct}%`,background:C.green,borderRadius:4,transition:"width .5s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <p style={{fontSize:11,color:C.green,fontWeight:600}}>{pct}% paid</p>
                <p style={{fontSize:11,color:C.red,fontWeight:600}}>₹{pending.toLocaleString()} pending</p>
              </div>
            </div>
          </div>
        )}

        {/* Fee records */}
        <SectionLabel>Fee Records</SectionLabel>
        {feesLoading?<EmptyState msg="Loading…"/>:fees.length===0?<EmptyState msg="No fee records for this student"/>:
        fees.map((f,i)=>{
          const [col,bg]=f.status==="Paid"?[C.green,C.greenL]:f.status==="Partial"?[C.amber,C.amberL]:[C.red,C.redL];
          return(
            <div key={f.id} style={{background:"#fff",borderRadius:12,padding:12,margin:"0 14px 8px",border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <div style={{flex:1}}>
                <p style={{fontWeight:700,fontSize:14,color:C.t1}}>{f.term}</p>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                  <Pill color={col} bg={bg}>{f.status}</Pill>
                  {f.due_date&&<span style={{fontSize:11,color:C.t3}}>Due {f.due_date}</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <p style={{fontWeight:800,fontSize:16,color:C.t1,fontFamily:"'Outfit',sans-serif"}}>₹{Number(f.amount).toLocaleString()}</p>
                <button onClick={()=>delFee(f.id)} style={{width:32,height:32,borderRadius:8,background:C.redL,border:"none",color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {Icon.trash}
                </button>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  // ── Student list ──
  return(
    <div style={{padding:14,paddingBottom:32}}>
      <div style={{position:"relative",marginBottom:10}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.t3}}>{Icon.search}</div>
        <input style={{width:"100%",padding:"11px 14px 11px 36px",borderRadius:12,border:`1.5px solid ${C.border}`,fontSize:13,color:C.t1,background:"#fff"}} placeholder="Search by name, ID or class…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <p style={{fontSize:12,color:C.t3,marginBottom:10,fontWeight:500}}>{filtered.length} students</p>
      {loading?<EmptyState msg="Loading…"/>:filtered.length===0?<EmptyState msg="No students found"/>:
      filtered.map(st=>(
        <button key={st.id} onClick={()=>openStudent(st)}
          style={{width:"100%",background:"#fff",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,cursor:"pointer",textAlign:"left"}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flex:1,minWidth:0}}>
            <div style={{width:40,height:40,borderRadius:10,background:C.tealL,display:"flex",alignItems:"center",justifyContent:"center",color:C.teal,fontSize:15,fontWeight:700,fontFamily:"'Outfit',sans-serif",flexShrink:0}}>
              {(st.name||st.id||"?")[0].toUpperCase()}
            </div>
            <div style={{minWidth:0}}>
              <p style={{fontWeight:700,fontSize:13,color:C.t1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{st.name||"—"}</p>
              <p style={{fontSize:11,color:C.t3}}>ID: {st.id} · Class {st.class||"—"} {st.section||""}</p>
            </div>
          </div>
          <div style={{color:C.t3,flexShrink:0}}>{Icon.back}</div>
        </button>
      ))}
    </div>
  );
}

// ─── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("cps_user"));}catch{return null;}});
  const onLogin=u=>setUser(u);
  const onLogout=()=>{localStorage.removeItem("cps_user");setUser(null);};
  if(!user) return <Login onLogin={onLogin}/>;
  if(user.role==="admin") return <AdminPanel user={user} onLogout={onLogout}/>;
  return <StudentDash user={user} onLogout={onLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
