const api = async (table, method="GET", body=null, query="", extraHeaders={}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      ...(method==="POST" ? {Prefer:"return=minimal"} : {}),
      ...extraHeaders
    },
    body: body ? JSON.stringify(body) : null,
  });
  if(method==="DELETE"||method==="PATCH") return null;
  const text = await res.text();
  return text ? JSON.parse(text) : [];
};

// ── LOGIN ───────────────────────────────────────────────────────
function Login({onLogin}){
  const [id,setId]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const login=async()=>{
    if(!id.trim()||!pw.trim()) return setErr("Enter your ID and password");
    setLoading(true); setErr("");
    try{
      const data=await api("users","GET",null,`?id=eq.${id.trim()}&password=eq.${pw.trim()}&select=*`);
      if(!data||data.length===0) return setErr("Wrong ID or password");
      localStorage.setItem("sa_user",JSON.stringify(data[0]));
      onLogin(data[0]);
    } catch(e){ setErr("Connection error. Check internet."); }
    finally{ setLoading(false); }
  };

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.teal} 0%,${C.tealD} 60%,#004d40 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontSize:64,marginBottom:6}}>🏫</div>
      <h1 style={{color:"#fff",fontSize:26,fontWeight:800,margin:"0 0 4px"}}>School App</h1>
      <p style={{color:"rgba(255,255,255,.65)",marginBottom:32,fontSize:13}}>Sign in to continue</p>
      <div style={{background:C.white,borderRadius:20,padding:24,width:"100%",maxWidth:360,boxShadow:"0 8px 32px rgba(0,0,0,.25)"}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:6,color:C.text}}>Student / Admin ID</p>
        <input style={s.inp} placeholder="Enter your ID" value={id} onChange={e=>setId(e.target.value)}/>
        <p style={{fontWeight:700,fontSize:14,marginBottom:6,color:C.text}}>Password</p>
        <input style={s.inp} type="password" placeholder="Enter password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
        {err&&<p style={{color:C.red,fontSize:13,marginBottom:8,textAlign:"center"}}>{err}</p>}
        <button style={s.btn} onClick={login} disabled={loading}>{loading?"Signing in...":"Sign In"}</button>
      </div>
      <p style={{color:"rgba(255,255,255,.4)",fontSize:11,marginTop:20}}>Free & Ad-free • School Management</p>
    </div>
  );
}

// ── STUDENT DASHBOARD ───────────────────────────────────────────
function StudentDash({user,onLogout}){

    const Comp=SCREENS[screen];
    return <Comp user={user} onBack={()=>setScreen(null)} onLogout={onLogout}/>;
  }
  return (
    <div style={s.app}>
      <div style={s.hdr}>
        <div>
          <p style={s.hdrTitle}>🏫 School App</p>
          <p style={s.hdrSub}>Welcome, {user.name||user.id}</p>
        </div>
        <button style={s.backBtn} onClick={onLogout} title="Logout">⏻</button>
      </div>
      <div style={{padding:"10px 14px 2px"}}>
        {user.class&&<span style={s.badge}>{user.class} — {user.section}</span>}
      </div>
      <div style={s.grid}>
        {tiles.map(t=>(
          <div key={t.key} style={{...s.tile,background:t.bg}} onClick={()=>setScreen(t.key)}

            <span style={{fontSize:30}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:700,textAlign:"center",color:C.text}}>{t.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ATTENDANCE ──────────────────────────────────────────────────
function AttendanceScreen({user,onBack}){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{api("attendance","GET",null,`?student_id=eq.${user.id}&order=date.desc`).then(d=>setData(d||[])).finally(()=>setLoading(false));},[]);
  const present=data.filter(d=>d.status==="Present").length;
  const total=data.length;
  const pct=total?Math.round((present/total)*100):0;
  const pctColor=pct>=75?C.green:pct>=50?C.orange:C.red;
  return (
    <div style={s.app}>
      <Hdr title="👥 Attendance" onBack={onBack}/>
      {total>0&&(
        <div style={{...s.card,textAlign:"center"}}>
          <svg width="100" height="100" viewBox="0 0 36 36" style={{margin:"0 auto 8px",display:"block"}}>
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" strokeWidth="3"/>
            <circle cx="18" cy="18" r="15.9" fill="none" stroke={pctColor} strokeWidth="3"
              strokeDasharray={`${pct} ${100-pct}`} strokeDashoffset="25" strokeLinecap="round"/>
          </svg>
          <p style={{fontSize:32,fontWeight:800,color:pctColor}}>{pct}%</p>
          <p style={{color:C.sub,fontSize:13}}>{present} present / {total} days</p>
          {pct<75&&<p style={{color:C.red,fontSize:12,marginTop:6,fontWeight:600}}>⚠️ Below 75% attendance</p>}
        </div>
      )}
      {loading?<p style={s.empty}>Loading...</p>:data.length===0?<p style={s.empty}>No attendance records</p>:
      data.map(a=>(
        <div key={a.id} style={{...s.row,padding:"9px 14px"}}>
          <span style={{fontSize:13}}>{a.date}</span>
          <span style={s.tag(a.status==="Present"?C.green:a.status==="Late"?C.orange:C.red)}>{a.status}</span>
        </div>
      ))}
    </div>
  );
}

// ── MARKS ───────────────────────────────────────────────────────
function MarksScreen({user,onBack}){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{api("marks","GET",null,`?student_id=eq.${user.id}&order=created_at.desc`).then(d=>setData(d||[])).finally(()=>setLoading(false));},[]);
  return (
    <div style={s.app}>
      <Hdr title="⭐ Marks" onBack={onBack}/>
      {loading?<p style={s.empty}>Loading...</p>:data.length===0?<p style={s.empty}>No marks recorded</p>:
      data.map(m=>{
        const pct=m.total_marks?Math.round((m.marks_obtained/m.total_marks)*100):0;
        const col=pct>=75?C.green:pct>=50?C.orange:C.red;
        return (
          <div key={m.id} style={s.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div>
                <p style={{fontWeight:700,marginBottom:2}}>{m.subject}</p>
                {m.exam_type&&<p style={{fontSize:11,color:C.sub}}>{m.exam_type}</p>}
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontSize:26,fontWeight:800,color:col}}>{m.marks_obtained}</span>
                <span style={{fontSize:13,color:C.sub}}>/{m.total_marks}</span>
              </div>
            </div>
            <div style={{background:"#f0f0f0",borderRadius:6,height:7}}>
              <div style={{width:`${pct}%`,background:col,height:7,borderRadius:6,transition:"width .4s"}}/>
            </div>
            <p style={{fontSize:11,color:col,fontWeight:700,marginTop:4,textAlign:"right"}}>{pct}%</p>
          </div>
        );
      })}
    </div>
  );
}

// ── FEES ────────────────────────────────────────────────────────
function FeesScreen({user,onBack}){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{api("fees","GET",null,`?student_id=eq.${user.id}&order=due_date.asc`).then(d=>setData(d||[])).finally(()=>setLoading(false));},[]);
  const total=data.reduce((a,b)=>a+(b.amount||0),0);
  const paid=data.filter(f=>f.status==="Paid").reduce((a,b)=>a+(b.amount||0),0);
  return (
    <div style={s.app}>
      <Hdr title="💰 Fees Payment" onBack={onBack}/>
      {data.length>0&&(
        <div style={{...s.card,display:"flex",gap:12}}>
          <div style={{flex:1,textAlign:"center",background:C.greenL,borderRadius:10,padding:10}}>
            <p style={{fontSize:11,color:C.green,fontWeight:600}}>Paid</p>
            <p style={{fontSize:20,fontWeight:800,color:C.green}}>₹{paid}</p>
          </div>
          <div style={{flex:1,textAlign:"center",background:C.redL,borderRadius:10,padding:10}}>
            <p style={{fontSize:11,color:C.red,fontWeight:600}}>Pending</p>
            <p style={{fontSize:20,fontWeight:800,color:C.red}}>₹{total-paid}</p>
          </div>
        </div>
      )}
      {loading?<p style={s.empty}>Loading...</p>:data.length===0?<p style={s.empty}>No fees records</p>:
      data.map(f=>(
        <div key={f.id} style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{fontWeight:700,marginBottom:2}}>{f.term}</p>
              {f.due_date&&<p style={{fontSize:11,color:C.sub}}>Due: {f.due_date}</p>}

        </div>
      ))}

}

// ── ADMIN UPLOAD ─────────────────────────────────────────────────
const UPLOAD_TYPES=[
  {key:"students",label:"Students",table:"users",note:"id | password | name | class | section | father_name | mother_name | phone | blood_group | transport_opted (Yes/No)"},
  {key:"attendance",label:"Attendance",table:"attendance",note:"student_id | date (YYYY-MM-DD) | status (Present/Absent/Late)"},
  {key:"marks",label:"Marks",table:"marks",note:"student_id | subject | exam_type | marks_obtained | total_marks"},
  {key:"fees",label:"Fees",table:"fees",note:"student_id | term | amount | status (Paid/Unpaid/Partial) | due_date"},
  {key:"homework",label:"Homework",table:"homework",note:"class | section | subject | task | due_date"},
  {key:"calendar",label:"Calendar",table:"calendar",note:"event_name | event_date (YYYY-MM-DD) | description"},
  {key:"comments",label:"Comments",table:"comments",note:"student_id | from_name | message | date"},
  {key:"transport",label:"Transport",table:"transport",note:"student_id | route | driver_name | driver_phone | stop_name | pickup_time | drop_time | vehicle_no"},
];

function AdminUpload(){
  const [type,setType]=useState("students");
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const chosen=UPLOAD_TYPES.find(t=>t.key===type);

  const handleFile=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setFile(f); setMsg(""); setPreview(null);
    try{
      const rows=await parseXLSX(f);
      setPreview(rows.slice(0,2));
    }catch(e){ setMsg("❌ Could not read file: "+e.message); }
  };

  const parseXLSX=(file)=>new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"binary"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        res(XLSX.utils.sheet_to_json(ws));
      }catch(err){rej(err);}
    };
    reader.onerror=rej;
    reader.readAsBinaryString(file);
  });

  const upload=async()=>{
    if(!file) return;
    setLoading(true); setMsg("");
    try{
      const rows=await parseXLSX(file);
      let processed=rows;
      if(type==="students"){
        processed=rows.map(r=>({...r,role:"student",transport_opted:String(r.transport_opted||"").toLowerCase()==="yes"}));
      }
      const res=await fetch(`${SUPABASE_URL}/rest/v1/${chosen.table}${type==="students"?"?on_conflict=id":""}`,{
        method:"POST",
        headers:{
          apikey:SUPABASE_KEY,
          Authorization:`Bearer ${SUPABASE_KEY}`,
          "Content-Type":"application/json",
          Prefer:type==="students"?"resolution=merge-duplicates":"return=minimal"
        },
        body:JSON.stringify(processed)
      });
      if(!res.ok) throw new Error(await res.text());
      setMsg(`✅ ${rows.length} ${chosen.label} records uploaded!`);
      setFile(null); setPreview(null);
    }catch(e){ setMsg("❌ "+e.message); }
    finally{ setLoading(false); }
  };

  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",flexWrap:"wrap",marginBottom:12}}>
        {UPLOAD_TYPES.map(t=>(
          <button key={t.key} style={s.chip(type===t.key)} onClick={()=>{setType(t.key);setFile(null);setPreview(null);setMsg("");}}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{...s.card,background:C.tealL,margin:"0 0 12px",borderLeft:`4px solid ${C.teal}`}}>
        <p style={{fontSize:11,fontWeight:700,color:C.teal,marginBottom:4}}>📋 Required Columns:</p>
        <p style={{fontSize:11,color:"#555",lineHeight:1.5}}>{chosen.note}</p>
      </div>
      <label style={s.fileBox}>
        📁 {file?file.name:"Tap to choose Excel file (.xlsx)"}
        <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleFile}/>
      </label>
      {preview&&(
        <div style={{...s.card,margin:"0 0 10px",overflowX:"auto"}}>
          <p style={{fontWeight:700,fontSize:12,marginBottom:6,color:C.teal}}>Preview (first 2 rows):</p>
          {preview.map((row,i)=>(
            <p key={i} style={{fontSize:10,color:"#555",marginBottom:4,lineHeight:1.5,wordBreak:"break-all"}}>{JSON.stringify(row)}</p>
          ))}
        </div>
      )}
      {msg&&<p style={{color:msg.startsWith("✅")?C.green:C.red,fontWeight:700,textAlign:"center",marginBottom:10,fontSize:13}}>{msg}</p>}
      {file&&<button style={s.btn} onClick={upload} disabled={loading}>{loading?`Uploading ${chosen.label}...`:`Upload ${chosen.label}`}</button>}
    </div>
  );
}

// ── ADMIN STUDENTS ───────────────────────────────────────────────
function AdminStudents(){
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  useEffect(()=>{api("users","GET",null,"?role=eq.student&order=name.asc").then(d=>setStudents(d||[])).finally(()=>setLoading(false));},[]);
  const filtered=students.filter(s=>
    (s.name||"").toLowerCase().includes(search.toLowerCase())||
    (s.id||"").toLowerCase().includes(search.toLowerCase())||
    (s.class||"").toLowerCase().includes(search.toLowerCase())
  );
  return (
    <div style={{padding:14}}>
      <input style={s.inp} placeholder="🔍 Search by name, ID or class..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <p style={{fontSize:12,color:C.sub,marginBottom:10}}>{filtered.length} students found</p>
      {loading?<p style={s.empty}>Loading...</p>:filtered.length===0?<p style={s.empty}>No students found</p>:
      filtered.map(st=>(
        <div key={st.id} style={{...s.card,margin:"0 0 10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <p style={{fontWeight:700,marginBottom:2}}>{st.name||"—"}</p>
              <p style={{fontSize:11,color:C.sub}}>ID: {st.id} • {st.class||"—"}-{st.section||"—"}</p>
              {st.phone&&<p style={{fontSize:11,color:C.sub}}>📞 {st.phone}</p>}
            </div>
            <div style={{textAlign:"right"}}>
              {st.transport_opted&&<span style={s.tag(C.teal)}>🚌</span>}
              {st.blood_group&&<p style={{fontSize:11,color:C.red,fontWeight:700,marginTop:4}}>{st.blood_group}</p>}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── ADMIN POST ───────────────────────────────────────────────────
function AdminPost(){
  const [title,setTitle]=useState("");
  const [desc,setDesc]=useState("");
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [list,setList]=useState([]);

  const load=()=>api("announcements","GET",null,"?order=date.desc&limit=15").then(d=>setList(d||[]));
  useEffect(()=>{load();},[]);

  const post=async()=>{
    if(!title.trim()) return setMsg("Enter a title");
    setLoading(true);
    try{
      await api("announcements","POST",{title:title.trim(),description:desc.trim()||null,date});
      setMsg("✅ Posted!"); setTitle(""); setDesc(""); load();
    }catch(e){setMsg("❌ Failed: "+e.message);}
    finally{setLoading(false);}
  };

  const del=async(id)=>{
    await api("announcements","DELETE",null,`?id=eq.${id}`);
    setList(list.filter(a=>a.id!==id));
  };

  return (
    <div style={{padding:14}}>
      <div style={{...s.card,margin:"0 0 14px"}}>
        <p style={{fontWeight:700,marginBottom:10}}>New Announcement</p>
        <input style={s.inp} placeholder="Title *" value={title} onChange={e=>setTitle(e.target.value)}/>
        <textarea style={{...s.inp,height:80,resize:"none"}} placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)}/>
        <input style={s.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        {msg&&<p style={{color:msg.startsWith("✅")?C.green:C.red,fontWeight:700,fontSize:13,marginBottom:8}}>{msg}</p>}
        <button style={s.btn} onClick={post} disabled={loading}>{loading?"Posting...":"Post Announcement"}</button>
      </div>
      <p style={{fontWeight:700,marginBottom:8}}>Recent Posts</p>
      {list.map(a=>(
        <div key={a.id} style={{...s.card,margin:"0 0 10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <p style={{fontWeight:700,marginBottom:2,fontSize:14}}>{a.title}</p>
              <p style={{fontSize:11,color:C.sub}}>{a.date}</p>
            </div>
            <button style={{...s.btnSm,background:C.red}} onClick={()=>del(a.id)}>🗑️</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── ADMIN MANAGE ─────────────────────────────────────────────────
function AdminManage(){
  const [section,setSection]=useState("homework");
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(false);

  const tables={homework:"homework",calendar:"calendar",comments:"comments",fees:"fees"};

  const load=async(sec)=>{
    setLoading(true); setList([]);
    try{
      const d=await api(tables[sec],"GET",null,"?order=created_at.desc&limit=20");
      setList(d||[]);
    }finally{setLoading(false);}
  };

  useEffect(()=>{load(section);},[section]);

  const del=async(id)=>{
    await api(tables[section],"DELETE",null,`?id=eq.${id}`);
    setList(list.filter(i=>i.id!==id));
  };

  const renderItem=(item)=>{
    if(section==="homework") return `${item.class} | ${item.subject} | ${item.task}`;
    if(section==="calendar") return `${item.event_date} | ${item.event_name}`;
    if(section==="comments") return `${item.student_id} | ${item.from_name}: ${item.message}`;
    if(section==="fees") return `${item.student_id} | ${item.term} | ₹${item.amount} | ${item.status}`;
    return JSON.stringify(item);
  };

  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",flexWrap:"wrap",marginBottom:12}}>
        {Object.keys(tables).map(k=>(
          <button key={k} style={s.chip(section===k)} onClick={()=>setSection(k)}>
            {k.charAt(0).toUpperCase()+k.slice(1)}
          </button>
        ))}
      </div>
      {loading?<p style={s.empty}>Loading...</p>:list.length===0?<p style={s.empty}>No records</p>:
      list.map(item=>(
        <div key={item.id} style={{...s.card,margin:"0 0 10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <p style={{fontSize:12,color:C.text,flex:1,lineHeight:1.5}}>{renderItem(item)}</p>
            <button style={{...s.btnSm,background:C.red,flexShrink:0}} onClick={()=>del(item.id)}>🗑️</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("sa_user"));}catch{return null;}
  });

  const onLogin=(u)=>setUser(u);
  const onLogout=()=>{localStorage.removeItem("sa_user");setUser(null);};

  if(!user) return <Login onLogin={onLogin}/>;
  if(user.role==="admin") return <AdminPanel user={user} onLogout={onLogout}/>;
  return <StudentDash user={user} onLogout={onLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
